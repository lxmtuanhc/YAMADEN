<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>YAMADEN Admin V2</title>
  <link rel="icon" type="image/png" href="/assets/icon-admin-192.png" />
  <link rel="apple-touch-icon" href="/assets/icon-admin-192.png" />
  <link rel="manifest" href="/data/admin-manifest.json" />
  <link rel="stylesheet" href="/admin-v2.css?v=20260519-chatgpt-mazii-polish" />
</head>
<body>
  <div class="admin-v2 admin-shell app-shell" id="appShell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="icon-button sidebar-toggle" id="sidebarToggleButton" type="button" aria-label="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>
        <div class="sidebar-brand">
          <img src="/assets/icon-admin-192.png" alt="YAMADEN" class="sidebar-brand-logo" />
          <div class="sidebar-brand-text">
            <div class="sidebar-brand-title">株式会社山電</div>
            <div class="sidebar-brand-sub">YAMADEN CO.,LTD</div>
          </div>
        </div>
      </div>
      <nav class="side-nav sidebar-nav" id="sideNav" aria-label="Admin navigation"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-company">
          <span class="company-mark">Y</span>
          <div>
            <strong>株式会社 山電</strong>
            <small>YAMADEN CO.,LTD</small>
          </div>
        </div>
        <div class="sidebar-version">
          <span>システムバージョン</span>
          <strong>v2.4.1</strong>
        </div>
        <button class="support-button" type="button">サポートに連絡</button>
      </div>
    </aside>

    <div class="mobile-scrim" id="mobileScrim"></div>

    <main class="main main-shell">
      <header class="topbar">
        <button class="icon-button menu-button" id="mobileMenuButton" type="button" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-left">
          <div class="topbar-brand">
            <img src="/assets/icon-admin-192.png" alt="YAMADEN" class="topbar-brand-logo" />
            <div class="topbar-brand-text">
              <div class="topbar-brand-title">株式会社山電</div>
              <div class="topbar-brand-sub">YAMADEN CO.,LTD</div>
            </div>
          </div>
          <div class="topbar-philosophy" aria-label="Company philosophy">
            <strong>人を守り、幸せを創る</strong>
            <span>Protecting people. Creating happiness.</span>
          </div>
        </div>
        <div class="topbar-actions">
          <select class="language-select" id="languageSelect" aria-label="Language">
            <option value="ja">日本語</option>
            <option value="vi">Tiếng Việt</option>
          </select>
          <div class="admin-profile">
            <div class="avatar">A</div>
            <div>
              <strong>Admin</strong>
            </div>
          </div>
          <button class="logout-button" id="logoutButton" type="button">ログアウト</button>
        </div>
      </header>

      <section class="content page">
        <div class="view-head page-header">
          <div>
            <p class="eyebrow" id="viewEyebrow">YAMADEN ADMIN</p>
            <h1 id="viewTitle">ダッシュボード</h1>
          </div>
          <button class="refresh-button" id="refreshButton" type="button">更新</button>
        </div>
        <div class="view" id="viewRoot"></div>
      </section>
    </main>
  </div>

  <div class="drawer" id="drawer" aria-hidden="true"></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="/admin-v2.js?v=20260519-chatgpt-mazii-polish" defer></script>
</body>
</html>
