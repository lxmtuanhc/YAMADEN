<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - YAMADEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f4f4f4;
  color: #111;
}

/* HEADER */
.header {
  height: 72px;
  background: #111;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 28px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.25);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 22px;
  font-weight: 800;
}

.logo img {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: white;
}

.header select {
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid #444;
  background: white;
  font-weight: bold;
}

/* MAIN */
.container {
  padding: 24px;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  margin-bottom: 22px;
}

.stat-card {
  background: white;
  border-radius: 20px;
  padding: 22px;
  border: 1px solid #ddd;
  box-shadow: 0 8px 22px rgba(0,0,0,0.08);
}

.stat-title {
  color: #555;
  font-size: 14px;
  margin-bottom: 8px;
}

.stat-number {
  font-size: 34px;
  font-weight: 900;
  color: #111;
}

/* TOOLBAR */
.toolbar {
  background: white;
  border-radius: 18px;
  padding: 16px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  border: 1px solid #ddd;
  box-shadow: 0 8px 22px rgba(0,0,0,0.06);
  margin-bottom: 18px;
}

.search input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #ccc;
  font-size: 15px;
}

.reload {
  padding: 14px 22px;
  border: none;
  border-radius: 14px;
  background: #111;
  color: white;
  font-weight: 800;
  cursor: pointer;
}

/* TABS */
.tabs {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
}

.tabs button {
  flex: 1;
  padding: 15px;
  border: none;
  border-radius: 16px;
  background: #e5e5e5;
  color: #111;
  font-weight: 900;
  cursor: pointer;
}

.tabs button.active {
  background: #111;
  color: white;
  box-shadow: 0 6px 16px rgba(0,0,0,0.25);
}

/* REQUEST CARD */
.request-card {
  background: white;
  border-radius: 22px;
  padding: 18px;
  margin-bottom: 18px;
  border: 1px solid #ddd;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  display: grid;
  grid-template-columns: 1.2fr 1fr 0.8fr 1.1fr;
  gap: 18px;
  align-items: start;
}

.request-id {
  font-size: 18px;
  font-weight: 900;
  color: #111;
  margin-bottom: 12px;
}

.info-line {
  margin: 8px 0;
  line-height: 1.5;
  color: #333;
}

.info-line b {
  color: #111;
}

.request-image {
  width: 100%;
  max-width: 220px;
  border-radius: 16px;
  border: 1px solid #ddd;
}

/* BADGE */
.badge {
  display: inline-block;
  padding: 7px 13px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 900;
}

.status-pending {
  background: #ddd;
  color: #111;
}

.status-processing {
  background: #777;
  color: white;
}

.status-completed {
  background: #111;
  color: white;
}

/* ACTION */
.action-col button,
.reply-box button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 14px;
  color: white;
  font-weight: 900;
  cursor: pointer;
  margin-bottom: 10px;
}

.btn-call { background: #000; }
.btn-map { background: #333; }
.btn-processing { background: #666; }
.btn-completed { background: #111; }
.btn-save { background: #111; }

/* REPLY */
.reply-box {
  border-left: 1px solid #ddd;
  padding-left: 18px;
}

.reply-title {
  font-weight: 900;
  margin-bottom: 10px;
}

.reply-box textarea {
  width: 100%;
  min-height: 150px;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #ccc;
  resize: vertical;
  font-size: 15px;
  margin-bottom: 10px;
}

.empty {
  background: white;
  padding: 24px;
  border-radius: 18px;
  text-align: center;
  border: 1px solid #ddd;
  color: #666;
}

/* MOBILE */
@media (max-width: 1100px) {
  .request-card {
    grid-template-columns: 1fr 1fr;
  }

  .reply-box {
    border-left: none;
    padding-left: 0;
  }
}

@media (max-width: 700px) {
  .stats {
    grid-template-columns: 1fr;
  }

  .toolbar {
    grid-template-columns: 1fr;
  }

  .request-card {
    grid-template-columns: 1fr;
  }

  .header {
    padding: 14px;
  }

  .logo span {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="/icon-192.png" alt="YAMADEN">
    <span>YAMADEN Admin</span>
  </div>

  <select id="language" onchange="changeLanguage()">
    <option value="vi">VI</option>
    <option value="ja">JP</option>
  </select>
</div>

<div class="container">

  <div class="stats">
    <div class="stat-card">
      <div class="stat-title" id="labelTotal">Tổng yêu cầu</div>
      <div class="stat-number" id="total">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title" id="labelActive">Đang xử lý</div>
      <div class="stat-number" id="active">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title" id="labelDone">Hoàn thành</div>
      <div class="stat-number" id="done">0</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search">
      <input id="search" placeholder="🔍 Tìm theo tên / SĐT / địa chỉ">
    </div>

    <button class="reload" id="reloadBtn" onclick="load()">Tải lại</button>
  </div>

  <div class="tabs">
    <button id="tabActive" class="active" onclick="changeTab('active')">Đang xử lý</button>
    <button id="tabDone" onclick="changeTab('done')">Đã hoàn thành</button>
  </div>

  <div id="list"></div>

</div>

<script>
const API = "https://yamaden.onrender.com";

let currentLang = localStorage.getItem("language") || "vi";
let currentTab = "active";

const texts = {
  vi: {
    total: "Tổng yêu cầu",
    active: "Đang xử lý",
    done: "Hoàn thành",
    reload: "Tải lại",
    search: "🔍 Tìm theo tên / SĐT / địa chỉ",
    name: "Tên",
    phone: "Số điện thoại",
    contact: "Liên hệ",
    address: "Địa chỉ",
    content: "Nội dung",
    image: "Hình ảnh",
    noImage: "Không có hình",
    status: "Trạng thái",
    date: "Ngày gửi",
    call: "📞 Gọi điện",
    map: "📍 Mở bản đồ",
    processing: "Đang xử lý",
    completed: "Hoàn thành",
    pending: "Đã tiếp nhận",
    reply: "Phản hồi khách hàng",
    save: "💾 Lưu phản hồi",
    empty: "Không có yêu cầu nào"
  },
  ja: {
    total: "総依頼数",
    active: "処理中",
    done: "完了",
    reload: "再読み込み",
    search: "🔍 名前 / 電話番号 / 住所で検索",
    name: "名前",
    phone: "電話番号",
    contact: "連絡先",
    address: "住所",
    content: "内容",
    image: "画像",
    noImage: "画像なし",
    status: "状態",
    date: "送信日時",
    call: "📞 電話する",
    map: "📍 地図を開く",
    processing: "処理中",
    completed: "完了",
    pending: "受付済み",
    reply: "お客様への返信",
    save: "💾 返信を保存",
    empty: "依頼はありません"
  }
};

function applyLanguage() {
  const t = texts[currentLang];

  language.value = currentLang;
  labelTotal.innerText = t.total;
  labelActive.innerText = t.active;
  labelDone.innerText = t.done;
  reloadBtn.innerText = t.reload;
  search.placeholder = t.search;

  updateTabLabels();
}

function changeLanguage() {
  currentLang = language.value;
  localStorage.setItem("language", currentLang);
  applyLanguage();
  load();
}

function changeTab(tab) {
  currentTab = tab;

  tabActive.classList.remove("active");
  tabDone.classList.remove("active");

  if (tab === "active") {
    tabActive.classList.add("active");
  } else {
    tabDone.classList.add("active");
  }

  load();
}

function updateTabLabels(activeCount = null, doneCount = null) {
  const t = texts[currentLang];

  if (activeCount === null || doneCount === null) {
    tabActive.innerText = t.active;
    tabDone.innerText = t.done;
  } else {
    tabActive.innerText = `${t.active} (${activeCount})`;
    tabDone.innerText = `${t.done} (${doneCount})`;
  }
}

function getStatusClass(status) {
  if (status === "processing") return "badge status-processing";
  if (status === "completed") return "badge status-completed";
  return "badge status-pending";
}

function getStatusText(status) {
  const t = texts[currentLang];

  if (status === "processing") return t.processing;
  if (status === "completed") return t.completed;
  return t.pending;
}

async function load() {
  const t = texts[currentLang];

  const res = await fetch(API + "/requests");
  const data = await res.json();

  const activeCount = data.filter(item => item.status !== "completed").length;
  const doneCount = data.filter(item => item.status === "completed").length;

  total.innerText = data.length;
  active.innerText = activeCount;
  done.innerText = doneCount;

  updateTabLabels(activeCount, doneCount);

  const keyword = search.value.toLowerCase();

  const filtered = data.filter(item => {
    const match =
      (item.name || "").toLowerCase().includes(keyword) ||
      (item.phone || "").toLowerCase().includes(keyword) ||
      (item.address || "").toLowerCase().includes(keyword) ||
      (item.content || "").toLowerCase().includes(keyword);

    if (currentTab === "active") {
      return match && item.status !== "completed";
    }

    return match && item.status === "completed";
  });

  list.innerHTML = "";

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">${t.empty}</div>`;
    return;
  }

  filtered.forEach(item => {
    const mapUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(item.address || "");

    list.innerHTML += `
      <div class="request-card">

        <div>
          <div class="request-id">#${item.id}</div>

          <div class="info-line"><b>${t.name}:</b> ${item.name || ""}</div>
          <div class="info-line"><b>${t.phone}:</b> ${item.phone || ""}</div>
          <div class="info-line"><b>${t.contact}:</b> ${item.contact || ""}</div>
          <div class="info-line"><b>${t.address}:</b> ${item.address || ""}</div>

          <div class="info-line">
            <b>${t.status}:</b>
            <span class="${getStatusClass(item.status)}">${getStatusText(item.status)}</span>
          </div>

          <div class="info-line"><b>${t.date}:</b> ${new Date(item.createdAt).toLocaleString()}</div>
        </div>

        <div>
          <div class="info-line"><b>${t.content}:</b><br>${item.content || ""}</div>

          <div class="info-line"><b>${t.image}:</b><br>
            ${
              item.image
              ? `<img class="request-image" src="${item.image}">`
              : t.noImage
            }
          </div>
        </div>

        <div class="action-col">
          ${item.phone ? `<a href="tel:${item.phone}"><button class="btn-call">${t.call}</button></a>` : ""}
          ${item.address ? `<a href="${mapUrl}" target="_blank"><button class="btn-map">${t.map}</button></a>` : ""}

          ${
            item.status !== "completed"
            ? `
              <button class="btn-processing" onclick="updateStatus(${item.id}, 'processing')">${t.processing}</button>
              <button class="btn-completed" onclick="updateStatus(${item.id}, 'completed')">${t.completed}</button>
            `
            : ""
          }
        </div>

        <div class="reply-box">
          <div class="reply-title">${t.reply}</div>
          <textarea id="reply-${item.id}">${item.adminReply || ""}</textarea>
          <button class="btn-save" onclick="saveReply(${item.id})">${t.save}</button>
        </div>

      </div>
    `;
  });
}

async function updateStatus(id, status) {
  await fetch(API + "/request/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status })
  });

  load();
}

async function saveReply(id) {
  const reply = document.getElementById("reply-" + id).value;

  await fetch(API + "/request/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ adminReply: reply })
  });

  load();
}

search.addEventListener("input", load);

applyLanguage();
load();
</script>

</body>
</html>
