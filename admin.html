<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin - YAMADEN</title>

  <style>
    body {
      font-family: Arial;
      background: #f3f6fb;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin: 10px;
    }

    .tabs button {
      flex: 1;
      padding: 10px;
      border: none;
      background: #ddd;
      cursor: pointer;
    }

    .tabs button.active {
      background: #0b3d91;
      color: white;
    }

    .card {
      border-radius:10px;
      padding:15px;
      margin:15px;
      background:#f5f5f5;
    }
  </style>
</head>
<body>

<select id="language" onchange="changeLanguage()">
  <option value="vi">Tiếng Việt</option>
  <option value="ja">日本語</option>
</select>

<h2 id="title">Danh sách yêu cầu khách hàng</h2>

<div class="tabs">
  <button id="tabActive" class="active" onclick="changeTab('active')">Đang xử lý</button>
  <button id="tabDone" onclick="changeTab('done')">Đã hoàn thành</button>
</div>

<button id="reloadBtn" onclick="loadRequests()">Tải lại</button>

<div id="list"></div>

<script>
const API = "https://yamaden.onrender.com";

let currentLang = localStorage.getItem("language") || "vi";
let currentTab = "active";

function changeTab(tab) {
  currentTab = tab;

  document.getElementById("tabActive").classList.remove("active");
  document.getElementById("tabDone").classList.remove("active");

  if (tab === "active") {
    document.getElementById("tabActive").classList.add("active");
  } else {
    document.getElementById("tabDone").classList.add("active");
  }

  loadRequests();
}

async function loadRequests() {
  const res = await fetch(API + "/requests");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  // 🔥 FILTER
  const filtered = data.filter(item => {
    if (currentTab === "active") {
      return item.status !== "completed";
    } else {
      return item.status === "completed";
    }
  });

  filtered.forEach(item => {
    const mapUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(item.address || "");

    list.innerHTML += `
      <div class="card">

        <p><b>ID:</b> ${item.id}</p>
        <p><b>Tên:</b> ${item.name || ""}</p>
        <p><b>Phone:</b> ${item.phone || ""}</p>
        <p><b>Địa chỉ:</b> ${item.address || ""}</p>
        <p><b>Nội dung:</b> ${item.content || ""}</p>

        <p><b>Hình:</b><br>
          ${item.image ? `<img src="${item.image}" width="200">` : "Không có"}
        </p>

        <p><b>Status:</b> ${item.status}</p>

        ${item.phone ? `<a href="tel:${item.phone}"><button>📞 Gọi</button></a><br><br>` : ""}
        ${item.address ? `<a href="${mapUrl}" target="_blank"><button>📍 Map</button></a><br><br>` : ""}

        ${
          item.status !== "completed"
          ? `<button onclick="updateStatus(${item.id}, 'processing')">Đang xử lý</button><br><br>
             <button onclick="updateStatus(${item.id}, 'completed')">Hoàn thành</button>`
          : ""
        }

        <hr>

        <p><b>Phản hồi:</b></p>
        <textarea id="reply-${item.id}">${item.adminReply || ""}</textarea>

        <button onclick="saveReply(${item.id})">Lưu</button>

      </div>
    `;
  });
}

async function updateStatus(id, status) {
  await fetch(API + "/request/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status })
  });

  loadRequests();
}

async function saveReply(id) {
  const reply = document.getElementById("reply-" + id).value;

  await fetch(API + "/request/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ adminReply: reply })
  });

  loadRequests();
}

function changeLanguage() {
  currentLang = document.getElementById("language").value;
  localStorage.setItem("language", currentLang);
}

loadRequests();
</script>

</body>
</html>
