<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - YAMADEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial;background:#f5f7fb;color:#111827}

.layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{background:#0f172a;color:#fff;padding:20px;display:flex;flex-direction:column}
.brand{display:flex;gap:10px;align-items:center;margin-bottom:25px}
.brand img{width:48px;height:48px;border-radius:12px;background:#fff}
.brand-title{font-size:22px;font-weight:900}
.brand-sub{font-size:12px;color:#cbd5e1}

.menu-title{font-size:12px;color:#94a3b8;margin:20px 10px 8px}
.menu-item{padding:12px;border-radius:12px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between}
.menu-item.active{background:#2563eb}
.menu-badge{background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:999px}

.sidebar-footer{margin-top:auto;font-size:12px;color:#cbd5e1}

/* MAIN */
.topbar{height:70px;background:#fff;border-bottom:1px solid #ddd;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.page-title{font-size:20px;font-weight:900}

.content{padding:20px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:15px}
.stat{background:#fff;padding:18px;border-radius:14px;border:1px solid #ddd}
.stat-number{font-size:28px;font-weight:900}

/* PANEL */
.panel{background:#fff;border-radius:16px;border:1px solid #ddd}

/* TOOLBAR */
.toolbar{display:grid;grid-template-columns:1fr auto;padding:12px;border-bottom:1px solid #ddd}
.search{padding:10px;border-radius:10px;border:1px solid #ccc}
.reload{padding:10px;border:none;border-radius:10px;background:#111;color:#fff}

/* TABS */
.tabs{display:flex;padding:0 12px;border-bottom:1px solid #ddd}
.tabs button{flex:1;border:none;padding:12px;background:none;font-weight:900}
.tabs .active{border-bottom:3px solid #2563eb;color:#2563eb}

/* ROW */
.request{display:grid;grid-template-columns:140px 1.5fr 120px 200px 280px;gap:12px;padding:14px;border-bottom:1px solid #eee}
.req-img{width:130px;height:100px;border-radius:10px;object-fit:cover;background:#eee}
.req-name{font-weight:900}

.badge{padding:6px 10px;border-radius:999px;font-size:12px}
.status-pending{background:#ddd}
.status-processing{background:#facc15}
.status-completed{background:#22c55e;color:#fff}

/* BUTTON */
.actions button{width:100%;margin-bottom:6px;padding:10px;border:none;border-radius:10px;color:#fff}
.call{background:#16a34a}
.map{background:#2563eb}
.processing{background:#f59e0b}
.completed{background:#111}
.delete{background:#dc2626}

/* REPLY */
.reply-card{border:1px solid #ddd;padding:10px;border-radius:10px}
.reply-card textarea{width:100%;height:70px;border:1px solid #ccc;border-radius:8px}
.save{width:100%;margin-top:6px;background:#111;color:#fff;border:none;padding:8px;border-radius:8px}

.empty{text-align:center;padding:20px;color:#666}

@media(max-width:1100px){
.layout{grid-template-columns:1fr}
.sidebar{display:none}
.request{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="layout">

<aside class="sidebar">
<div class="brand">
<img src="/icon-192.png">
<div>
<div class="brand-title">YAMADEN</div>
<div class="brand-sub">Admin</div>
</div>
</div>

<div class="menu-item active">Dashboard</div>
<div class="menu-title">REQUEST</div>
<div class="menu-item" onclick="changeTab('active')">Đang xử lý <span id="sideActive">0</span></div>
<div class="menu-item" onclick="changeTab('done')">Hoàn thành <span id="sideDone">0</span></div>

<div class="sidebar-footer">© 2026</div>
</aside>

<main>
<div class="topbar">
<div class="page-title">Quản lý yêu cầu</div>
<select id="language" onchange="changeLanguage()">
<option value="vi">VI</option>
<option value="ja">JP</option>
</select>
</div>

<div class="content">

<div class="stats">
<div class="stat"><div>Tổng</div><div id="total" class="stat-number">0</div></div>
<div class="stat"><div>Đang xử lý</div><div id="active" class="stat-number">0</div></div>
<div class="stat"><div>Hoàn thành</div><div id="done" class="stat-number">0</div></div>
<div class="stat"><div>Hôm nay</div><div id="today" class="stat-number">0</div></div>
</div>

<div class="panel">
<div class="toolbar">
<input id="search" class="search" placeholder="Tìm...">
<button class="reload" onclick="load()">Reload</button>
</div>

<div class="tabs">
<button id="tabActive" class="active" onclick="changeTab('active')">Đang xử lý</button>
<button id="tabDone" onclick="changeTab('done')">Hoàn thành</button>
</div>

<div id="list"></div>

</div>
</div>
</main>
</div>

<script>
const API="https://yamaden.onrender.com";
let currentTab="active";

function changeTab(tab){
currentTab=tab;
tabActive.classList.toggle("active",tab==="active");
tabDone.classList.toggle("active",tab==="done");
load();
}

function getStatusClass(s){
if(s==="processing")return"badge status-processing";
if(s==="completed")return"badge status-completed";
return"badge status-pending";
}

async function load(){
const res=await fetch(API+"/requests");
const data=await res.json();

const activeCount=data.filter(i=>i.status!=="completed").length;
const doneCount=data.filter(i=>i.status==="completed").length;

total.innerText=data.length;
active.innerText=activeCount;
done.innerText=doneCount;

sideActive.innerText=activeCount;
sideDone.innerText=doneCount;

const filtered=data.filter(i=>{
if(currentTab==="active")return i.status!=="completed";
return i.status==="completed";
});

list.innerHTML="";

if(filtered.length===0){
list.innerHTML="<div class='empty'>Không có dữ liệu</div>";
return;
}

filtered.forEach(i=>{
const map="https://www.google.com/maps?q="+encodeURIComponent(i.address||"");

list.innerHTML+=`
<div class="request">

<div>${i.image?`<img class="req-img" src="${i.image}">`:""}</div>

<div>
<div class="req-name">${i.name||""}</div>
<div>${i.phone||""}</div>
<div>${i.address||""}</div>
<div>${i.content||""}</div>
</div>

<div><span class="${getStatusClass(i.status)}">${i.status}</span></div>

<div class="actions">
${i.phone?`<a href="tel:${i.phone}"><button class="call">Call</button></a>`:""}
${i.address?`<a href="${map}" target="_blank"><button class="map">Map</button></a>`:""}

${
i.status!=="completed"
?`
<button class="processing" onclick="updateStatus(${i.id},'processing')">Processing</button>
<button class="completed" onclick="updateStatus(${i.id},'completed')">Done</button>
`
:`
<button class="delete" onclick="deleteRequest(${i.id})">🗑️ Xóa</button>
`
}
</div>

<div class="reply-card">
<textarea id="reply-${i.id}">${i.adminReply||""}</textarea>
<button class="save" onclick="saveReply(${i.id})">Save</button>
</div>

</div>
`;
});
}

async function updateStatus(id,status){
await fetch(API+"/request/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status})
});
load();
}

async function saveReply(id){
const reply=document.getElementById("reply-"+id).value;

await fetch(API+"/request/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({adminReply:reply})
});
load();
}

async function deleteRequest(id){
if(!confirm("Xóa yêu cầu?"))return;

await fetch(API+"/request/"+id,{method:"DELETE"});
load();
}

search.addEventListener("input",load);

load();
</script>

</body>
</html>
