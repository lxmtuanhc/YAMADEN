<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - YAMADEN</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI";
  background:#eef4ff;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#0b3d91,#1f8dd6);
  color:white;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header h1{
  margin:0;
  font-size:20px;
}

.header select{
  border:none;
  border-radius:10px;
  padding:8px;
}

/* DASHBOARD */
.dashboard{
  display:flex;
  gap:10px;
  padding:15px;
}

.box{
  flex:1;
  background:white;
  border-radius:16px;
  padding:15px;
  text-align:center;
  box-shadow:0 6px 16px rgba(0,0,0,0.1);
}

.box h2{
  margin:0;
  font-size:22px;
  color:#0b3d91;
}

/* SEARCH */
.search{
  padding:0 15px;
}

.search input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  padding:15px;
}

.tabs button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#dbe8ff;
  color:#0b3d91;
  font-weight:bold;
}

.tabs button.active{
  background:#0b3d91;
  color:white;
}

/* CARD */
.card{
  margin:15px;
  padding:18px;
  border-radius:18px;
  background:white;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.image{
  width:100%;
  max-width:240px;
  border-radius:12px;
}

/* BUTTON */
.btn{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:bold;
}

.call{background:#16a34a;}
.map{background:#2563eb;}
.processing{background:#d97706;}
.done{background:#16a34a;}

/* STATUS */
.badge{
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.pending{background:#eee;}
.processing-b{background:orange;color:white;}
.done-b{background:green;color:white;}

textarea{
  width:100%;
  min-height:130px;
  margin-top:10px;
  border-radius:12px;
  padding:12px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">
  <h1>⚡ YAMADEN Admin</h1>
  <select id="language" onchange="changeLanguage()">
    <option value="vi">VI</option>
    <option value="ja">JP</option>
  </select>
</div>

<div class="dashboard">
  <div class="box"><h2 id="total">0</h2>Tổng</div>
  <div class="box"><h2 id="active">0</h2>Đang xử lý</div>
  <div class="box"><h2 id="done">0</h2>Hoàn thành</div>
</div>

<div class="search">
  <input id="search" placeholder="🔍 Tìm theo tên / SĐT">
</div>

<div class="tabs">
  <button id="tabActive" class="active" onclick="changeTab('active')">Đang xử lý</button>
  <button id="tabDone" onclick="changeTab('done')">Hoàn thành</button>
</div>

<div id="list"></div>

<script>
const API="https://yamaden.onrender.com";
let currentTab="active";

function changeTab(tab){
  currentTab=tab;
  tabActive.classList.remove("active");
  tabDone.classList.remove("active");

  if(tab==="active") tabActive.classList.add("active");
  else tabDone.classList.add("active");

  load();
}

function getBadge(status){
  if(status==="processing") return "badge processing-b";
  if(status==="completed") return "badge done-b";
  return "badge pending";
}

async function load(){
  const res=await fetch(API+"/requests");
  const data=await res.json();

  total.innerText=data.length;
  active.innerText=data.filter(x=>x.status!=="completed").length;
  done.innerText=data.filter(x=>x.status==="completed").length;

  const keyword=search.value.toLowerCase();

  const filtered=data.filter(x=>{
    const match =
      (x.name||"").toLowerCase().includes(keyword) ||
      (x.phone||"").toLowerCase().includes(keyword);

    if(currentTab==="active") return match && x.status!=="completed";
    return match && x.status==="completed";
  });

  list.innerHTML="";

  filtered.forEach(item=>{
    const map="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(item.address||"");

    list.innerHTML+=`
    <div class="card">

      <b>ID:</b> ${item.id}<br>
      <b>Tên:</b> ${item.name||""}<br>
      <b>SĐT:</b> ${item.phone||""}<br>
      <b>Địa chỉ:</b> ${item.address||""}<br>
      <b>Nội dung:</b> ${item.content||""}<br><br>

      ${item.image?`<img class="image" src="${item.image}"><br><br>`:""}

      <b>Status:</b> <span class="${getBadge(item.status)}">${item.status}</span><br><br>

      ${item.phone?`<a href="tel:${item.phone}"><button class="btn call">📞 Gọi</button></a>`:""}
      ${item.address?`<a href="${map}" target="_blank"><button class="btn map">📍 Map</button></a>`:""}

      ${
        item.status!=="completed"?
        `
        <button class="btn processing" onclick="updateStatus(${item.id},'processing')">Đang xử lý</button>
        <button class="btn done" onclick="updateStatus(${item.id},'completed')">Hoàn thành</button>
        `
        :""
      }

      <textarea id="reply-${item.id}">${item.adminReply||""}</textarea>
      <button class="btn" onclick="saveReply(${item.id})">Lưu phản hồi</button>

    </div>
    `;
  });
}

async function updateStatus(id,status){
  await fetch(API+"/request/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({status})
  });
  load();
}

async function saveReply(id){
  const val=document.getElementById("reply-"+id).value;

  await fetch(API+"/request/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({adminReply:val})
  });

  load();
}

search.addEventListener("input",load);

load();
</script>

</body>
</html>
