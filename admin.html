<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin - YAMADEN</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 10px;
      color: #0b3d91;
    }

    .notice {
      display: none;
      background: #fff3cd;
      color: #92400e;
      padding: 12px;
      border-radius: 10px;
      margin: 10px 0;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin: 15px 0;
    }

    .tabs button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #dbe8ff;
      color: #0b3d91;
      cursor: pointer;
      font-weight: bold;
    }

    .tabs button.active {
      background: #0b3d91;
      color: white;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #0b3d91;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .reload {
      margin-bottom: 10px;
    }

    .card {
      border-radius: 16px;
      padding: 18px;
      margin: 16px 0;
      background: white;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .info p {
      margin: 8px 0;
      line-height: 1.5;
    }

    .image {
      max-width: 240px;
      width: 100%;
      border-radius: 10px;
      margin-top: 8px;
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .action-row button {
      flex: 1;
      min-width: 140px;
    }

    .btn-call { background: #16a34a; }
    .btn-map { background: #2563eb; }
    .btn-processing { background: #d97706; }
    .btn-completed { background: #16a34a; }

    .reply-box {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #ddd;
    }

    .reply-box textarea {
      width: 100%;
      min-height: 150px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 15px;
      box-sizing: border-box;
      resize: vertical;
      background: #fff;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
    }

    .reply-box button {
      width: 100%;
      margin-top: 10px;
    }

    .status {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-weight: bold;
    }

    .status-pending { background: #e5e7eb; color: #374151; }
    .status-processing { background: #fef3c7; color: #92400e; }
    .status-completed { background: #dcfce7; color: #166534; }
  </style>
</head>

<body>

<select id="language" onchange="changeLanguage()">
  <option value="vi">Tiếng Việt</option>
  <option value="ja">日本語</option>
</select>

<h2 id="title">Danh sách yêu cầu khách hàng</h2>

<div id="notice" class="notice">🔔 Có yêu cầu mới!</div>

<div class="tabs">
  <button id="tabActive" class="active" onclick="changeTab('active')">Đang xử lý</button>
  <button id="tabDone" onclick="changeTab('done')">Đã hoàn thành</button>
</div>

<button class="reload" id="reloadBtn" onclick="loadRequests(false)">Tải lại</button>

<div id="list"></div>

<script>
const API = "https://yamaden.onrender.com";

let currentLang = localStorage.getItem("language") || "vi";
let currentTab = "active";
let lastRequestCount = null;

const texts = {
  vi: {
    title: "Danh sách yêu cầu khách hàng",
    active: "Đang xử lý",
    done: "Đã hoàn thành",
    reload: "Tải lại",
    id: "ID",
    name: "Tên",
    phone: "Số điện thoại",
    contact: "Liên hệ",
    address: "Địa chỉ",
    content: "Nội dung",
    image: "Hình ảnh",
    noImage: "Không có hình",
    status: "Trạng thái",
    date: "Ngày gửi",
    call: "📞 Gọi điện",
    map: "📍 Mở bản đồ",
    processing: "Đang xử lý",
    completed: "Hoàn thành",
    reply: "Phản hồi",
    save: "Lưu phản hồi",
    newRequest: "🔔 Có yêu cầu mới!"
  },
  ja: {
    title: "お客様リクエスト一覧",
    active: "処理中",
    done: "完了",
    reload: "再読み込み",
    id: "ID",
    name: "名前",
    phone: "電話番号",
    contact: "連絡先",
    address: "住所",
    content: "内容",
    image: "画像",
    noImage: "画像なし",
    status: "状態",
    date: "送信日時",
    call: "📞 電話する",
    map: "📍 地図を開く",
    processing: "処理中",
    completed: "完了",
    reply: "返信",
    save: "返信を保存",
    newRequest: "🔔 新しい依頼があります！"
  }
};

function applyLanguage() {
  const t = texts[currentLang];

  document.getElementById("language").value = currentLang;
  document.getElementById("title").innerText = t.title;
  document.getElementById("reloadBtn").innerText = t.reload;
}

function changeLanguage() {
  currentLang = document.getElementById("language").value;
  localStorage.setItem("language", currentLang);
  applyLanguage();
  loadRequests(false);
}

function changeTab(tab) {
  currentTab = tab;

  document.getElementById("tabActive").classList.remove("active");
  document.getElementById("tabDone").classList.remove("active");

  if (tab === "active") {
    document.getElementById("tabActive").classList.add("active");
  } else {
    document.getElementById("tabDone").classList.add("active");
  }

  loadRequests(false);
}

function getStatusClass(status) {
  if (status === "processing") return "status status-processing";
  if (status === "completed") return "status status-completed";
  return "status status-pending";
}

function notifyNewRequest() {
  const t = texts[currentLang];

  const notice = document.getElementById("notice");
  notice.innerText = t.newRequest;
  notice.style.display = "block";

  setTimeout(() => {
    notice.style.display = "none";
  }, 5000);

  try {
    const audio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=");
    audio.play();
  } catch (e) {}

  alert(t.newRequest);
}

async function loadRequests(checkNotify = true) {
  const t = texts[currentLang];

  const res = await fetch(API + "/requests");
  const data = await res.json();

  if (checkNotify && lastRequestCount !== null && data.length > lastRequestCount) {
    notifyNewRequest();
  }

  lastRequestCount = data.length;

  const activeCount = data.filter(item => item.status !== "completed").length;
  const doneCount = data.filter(item => item.status === "completed").length;

  document.getElementById("tabActive").innerText = `${t.active} (${activeCount})`;
  document.getElementById("tabDone").innerText = `${t.done} (${doneCount})`;

  const list = document.getElementById("list");
  list.innerHTML = "";

  const filtered = data.filter(item => {
    if (currentTab === "active") {
      return item.status !== "completed";
    } else {
      return item.status === "completed";
    }
  });

  filtered.forEach(item => {
    const mapUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(item.address || "");

    list.innerHTML += `
      <div class="card">
        <div class="info">
          <p><b>${t.id}:</b> ${item.id}</p>
          <p><b>${t.name}:</b> ${item.name || ""}</p>
          <p><b>${t.phone}:</b> ${item.phone || ""}</p>
          <p><b>${t.contact}:</b> ${item.contact || ""}</p>
          <p><b>${t.address}:</b> ${item.address || ""}</p>
          <p><b>${t.content}:</b> ${item.content || ""}</p>

          <p><b>${t.image}:</b><br>
            ${
              item.image
              ? `<img class="image" src="${item.image}">`
              : t.noImage
            }
          </p>

          <p><b>${t.status}:</b> <span class="${getStatusClass(item.status)}">${item.status}</span></p>
          <p><b>${t.date}:</b> ${new Date(item.createdAt).toLocaleString()}</p>
        </div>

        <div class="action-row">
          ${item.phone ? `<a href="tel:${item.phone}"><button class="btn-call">${t.call}</button></a>` : ""}
          ${item.address ? `<a href="${mapUrl}" target="_blank"><button class="btn-map">${t.map}</button></a>` : ""}
        </div>

        ${
          item.status !== "completed"
          ? `
            <div class="action-row">
              <button class="btn-processing" onclick="updateStatus(${item.id}, 'processing')">${t.processing}</button>
              <button class="btn-completed" onclick="updateStatus(${item.id}, 'completed')">${t.completed}</button>
            </div>
          `
          : ""
        }

        <div class="reply-box">
          <p><b>${t.reply}:</b></p>
          <textarea id="reply-${item.id}">${item.adminReply || ""}</textarea>
          <button onclick="saveReply(${item.id})">${t.save}</button>
        </div>
      </div>
    `;
  });
}

async function updateStatus(id, status) {
  await fetch(API + "/request/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status })
  });

  loadRequests(false);
}

async function saveReply(id) {
  const reply = document.getElementById("reply-" + id).value;

  await fetch(API + "/request/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ adminReply: reply })
  });

  loadRequests(false);
}

applyLanguage();
loadRequests(false);


</script>

</body>
</html>
