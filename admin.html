<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - YAMADEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f5f7fb;
  color: #111827;
}

.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  background: #0f172a;
  color: white;
  padding: 22px 16px;
  display: flex;
  flex-direction: column;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}

.brand img {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: white;
}

.brand-title {
  font-size: 24px;
  font-weight: 900;
}

.brand-sub {
  font-size: 12px;
  color: #cbd5e1;
}

.menu-title {
  color: #94a3b8;
  font-size: 12px;
  font-weight: 800;
  margin: 22px 12px 10px;
}

.menu-item {
  padding: 13px 14px;
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  font-weight: 700;
  color: #e5e7eb;
  display: flex;
  justify-content: space-between;
}

.menu-item.active {
  background: #2563eb;
  color: white;
}

.menu-badge {
  background: rgba(255,255,255,0.16);
  padding: 2px 9px;
  border-radius: 999px;
}

.sidebar-footer {
  margin-top: auto;
  color: #cbd5e1;
  font-size: 12px;
  line-height: 1.6;
}

/* MAIN */
.main {
  padding: 0;
}

.topbar {
  height: 76px;
  background: white;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
}

.page-title {
  font-size: 22px;
  font-weight: 900;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.lang {
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid #d1d5db;
  font-weight: 700;
}

.admin-info {
  font-weight: 800;
}

.content {
  padding: 24px;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  margin-bottom: 22px;
}

.stat {
  background: white;
  border-radius: 18px;
  padding: 22px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 8px 22px rgba(0,0,0,0.06);
}

.stat-label {
  color: #64748b;
  font-size: 14px;
  margin-bottom: 8px;
}

.stat-number {
  font-size: 34px;
  font-weight: 900;
}

.panel {
  background: white;
  border-radius: 20px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  overflow: hidden;
}

/* TOOLBAR */
.toolbar {
  padding: 18px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  border-bottom: 1px solid #e5e7eb;
}

.search {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
  font-size: 15px;
}

.reload {
  border: none;
  border-radius: 14px;
  padding: 14px 22px;
  background: #0f172a;
  color: white;
  font-weight: 900;
  cursor: pointer;
}

/* TABS */
.tabs {
  display: flex;
  gap: 26px;
  padding: 0 18px;
  border-bottom: 1px solid #e5e7eb;
}

.tabs button {
  background: none;
  border: none;
  padding: 18px 4px;
  font-weight: 900;
  cursor: pointer;
  color: #64748b;
  border-bottom: 3px solid transparent;
}

.tabs button.active {
  color: #2563eb;
  border-bottom-color: #2563eb;
}

/* REQUEST ROW */
.request {
  display: grid;
  grid-template-columns: 150px 1.7fr 130px 230px 320px;
  gap: 18px;
  padding: 18px;
  border-bottom: 1px solid #e5e7eb;
  align-items: center;
}

.request:last-child {
  border-bottom: none;
}

.req-img {
  width: 140px;
  height: 105px;
  object-fit: cover;
  border-radius: 14px;
  border: 1px solid #e5e7eb;
  background: #f1f5f9;
}

.req-id {
  color: #2563eb;
  font-weight: 900;
  margin-bottom: 8px;
}

.req-name {
  font-size: 18px;
  font-weight: 900;
}

.req-phone {
  color: #2563eb;
  font-weight: 800;
  margin-left: 10px;
}

.req-line {
  margin-top: 7px;
  color: #475569;
  line-height: 1.45;
}

.badge {
  display: inline-block;
  padding: 7px 13px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 900;
}

.status-pending { background: #e5e7eb; color: #111; }
.status-processing { background: #fff1d6; color: #b45309; }
.status-completed { background: #dcfce7; color: #166534; }

.actions button {
  width: 100%;
  margin-bottom: 9px;
  padding: 12px;
  border: none;
  border-radius: 13px;
  color: white;
  font-weight: 900;
  cursor: pointer;
}

.call { background: #16a34a; }
.map { background: #2563eb; }
.processing { background: #f59e0b; }
.completed { background: #111827; }

.reply-card {
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 14px;
  background: #fafafa;
}

.reply-title {
  font-weight: 900;
  margin-bottom: 8px;
}

.reply-card textarea {
  width: 100%;
  min-height: 90px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #d1d5db;
  resize: vertical;
  font-size: 14px;
}

.save {
  width: 100%;
  margin-top: 8px;
  padding: 11px;
  border: none;
  border-radius: 12px;
  background: #0f172a;
  color: white;
  font-weight: 900;
  cursor: pointer;
}

.empty {
  padding: 35px;
  text-align: center;
  color: #64748b;
}

/* RESPONSIVE */
@media (max-width: 1200px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .request { grid-template-columns: 1fr; }
  .req-img { width: 100%; height: 180px; }
}

@media (max-width: 700px) {
  .stats { grid-template-columns: 1fr; }
  .toolbar { grid-template-columns: 1fr; }
  .topbar { padding: 0 14px; }
  .content { padding: 14px; }
}
</style>
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <div class="brand">
      <img src="/icon-192.png" alt="YAMADEN">
      <div>
        <div class="brand-title">YAMADEN</div>
        <div class="brand-sub">Admin Dashboard</div>
      </div>
    </div>

    <div class="menu-item active">🏠 Tổng quan</div>

    <div class="menu-title">QUẢN LÝ YÊU CẦU</div>
    <div class="menu-item" onclick="changeTab('active')">🕒 Đang xử lý <span class="menu-badge" id="sideActive">0</span></div>
    <div class="menu-item" onclick="changeTab('done')">✅ Hoàn thành <span class="menu-badge" id="sideDone">0</span></div>

    <div class="menu-title">CÀI ĐẶT</div>
    <div class="menu-item">⚙️ Cài đặt</div>

    <div class="sidebar-footer">
      © 2026 YAMADEN<br>
      Customer Request System
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="page-title" id="pageTitle">Quản lý yêu cầu khách hàng</div>

      <div class="top-actions">
        <select class="lang" id="language" onchange="changeLanguage()">
          <option value="vi">VI</option>
          <option value="ja">JP</option>
        </select>
        <div class="admin-info">Admin</div>
      </div>
    </div>

    <div class="content">

      <div class="stats">
        <div class="stat">
          <div class="stat-label" id="labelTotal">Tổng yêu cầu</div>
          <div class="stat-number" id="total">0</div>
        </div>

        <div class="stat">
          <div class="stat-label" id="labelActive">Đang xử lý</div>
          <div class="stat-number" id="active">0</div>
        </div>

        <div class="stat">
          <div class="stat-label" id="labelDone">Hoàn thành</div>
          <div class="stat-number" id="done">0</div>
        </div>

        <div class="stat">
          <div class="stat-label" id="labelToday">Hôm nay</div>
          <div class="stat-number" id="today">0</div>
        </div>
      </div>

      <div class="panel">
        <div class="toolbar">
          <input class="search" id="search" placeholder="🔍 Tìm theo tên, SĐT, địa chỉ...">
          <button class="reload" id="reloadBtn" onclick="load()">Tải lại</button>
        </div>

        <div class="tabs">
          <button id="tabActive" class="active" onclick="changeTab('active')">Đang xử lý</button>
          <button id="tabDone" onclick="changeTab('done')">Hoàn thành</button>
        </div>

        <div id="list"></div>
      </div>

    </div>
  </main>

</div>

<script>
const API = "https://yamaden.onrender.com";

let currentLang = localStorage.getItem("language") || "vi";
let currentTab = "active";

const texts = {
  vi: {
    pageTitle: "Quản lý yêu cầu khách hàng",
    total: "Tổng yêu cầu",
    active: "Đang xử lý",
    done: "Hoàn thành",
    today: "Hôm nay",
    reload: "Tải lại",
    search: "🔍 Tìm theo tên, SĐT, địa chỉ...",
    name: "Tên",
    phone: "SĐT",
    contact: "Liên hệ",
    address: "Địa chỉ",
    content: "Nội dung",
    image: "Hình ảnh",
    noImage: "Không có hình",
    status: "Trạng thái",
    date: "Ngày gửi",
    call: "📞 Gọi",
    map: "📍 Bản đồ",
    processing: "Đang xử lý",
    completed: "Hoàn thành",
    pending: "Mới tiếp nhận",
    reply: "Phản hồi khách hàng",
    save: "Lưu phản hồi",
    empty: "Không có yêu cầu nào"
  },
  ja: {
    pageTitle: "お客様リクエスト管理",
    total: "総依頼数",
    active: "処理中",
    done: "完了",
    today: "本日",
    reload: "再読み込み",
    search: "🔍 名前、電話番号、住所で検索...",
    name: "名前",
    phone: "電話番号",
    contact: "連絡先",
    address: "住所",
    content: "内容",
    image: "画像",
    noImage: "画像なし",
    status: "状態",
    date: "送信日時",
    call: "📞 電話",
    map: "📍 地図",
    processing: "処理中",
    completed: "完了",
    pending: "受付済み",
    reply: "お客様への返信",
    save: "返信を保存",
    empty: "依頼はありません"
  }
};

function applyLanguage() {
  const t = texts[currentLang];

  language.value = currentLang;
  pageTitle.innerText = t.pageTitle;
  labelTotal.innerText = t.total;
  labelActive.innerText = t.active;
  labelDone.innerText = t.done;
  labelToday.innerText = t.today;
  reloadBtn.innerText = t.reload;
  search.placeholder = t.search;

  updateTabLabels();
}

function changeLanguage() {
  currentLang = language.value;
  localStorage.setItem("language", currentLang);
  applyLanguage();
  load();
}

function changeTab(tab) {
  currentTab = tab;

  tabActive.classList.remove("active");
  tabDone.classList.remove("active");

  if (tab === "active") {
    tabActive.classList.add("active");
  } else {
    tabDone.classList.add("active");
  }

  load();
}

function updateTabLabels(activeCount = null, doneCount = null) {
  const t = texts[currentLang];

  if (activeCount === null || doneCount === null) {
    tabActive.innerText = t.active;
    tabDone.innerText = t.done;
  } else {
    tabActive.innerText = `${t.active} (${activeCount})`;
    tabDone.innerText = `${t.done} (${doneCount})`;
    sideActive.innerText = activeCount;
    sideDone.innerText = doneCount;
  }
}

function getStatusClass(status) {
  if (status === "processing") return "badge status-processing";
  if (status === "completed") return "badge status-completed";
  return "badge status-pending";
}

function getStatusText(status) {
  const t = texts[currentLang];

  if (status === "processing") return t.processing;
  if (status === "completed") return t.completed;
  return t.pending;
}

function isToday(dateString) {
  const d = new Date(dateString);
  const now = new Date();

  return d.getFullYear() === now.getFullYear()
    && d.getMonth() === now.getMonth()
    && d.getDate() === now.getDate();
}

async function load() {
  const t = texts[currentLang];

  const res = await fetch(API + "/requests");
  const data = await res.json();

  const activeCount = data.filter(item => item.status !== "completed").length;
  const doneCount = data.filter(item => item.status === "completed").length;
  const todayCount = data.filter(item => isToday(item.createdAt)).length;

  total.innerText = data.length;
  active.innerText = activeCount;
  done.innerText = doneCount;
  today.innerText = todayCount;

  updateTabLabels(activeCount, doneCount);

  const keyword = search.value.toLowerCase();

  const filtered = data.filter(item => {
    const match =
      (item.name || "").toLowerCase().includes(keyword) ||
      (item.phone || "").toLowerCase().includes(keyword) ||
      (item.address || "").toLowerCase().includes(keyword) ||
      (item.content || "").toLowerCase().includes(keyword);

    if (currentTab === "active") {
      return match && item.status !== "completed";
    }

    return match && item.status === "completed";
  });

  list.innerHTML = "";

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">${t.empty}</div>`;
    return;
  }

  filtered.forEach(item => {
    const mapUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(item.address || "");

    list.innerHTML += `
      <div class="request">

        <div>
          ${
            item.image
            ? `<img class="req-img" src="${item.image}">`
            : `<div class="req-img"></div>`
          }
        </div>

        <div>
          <div class="req-id">#${item.id}</div>
          <div>
            <span class="req-name">${item.name || ""}</span>
            <span class="req-phone">${item.phone || ""}</span>
          </div>

          <div class="req-line">📍 ${item.address || ""}</div>
          <div class="req-line">${item.content || ""}</div>
          <div class="req-line">🕒 ${new Date(item.createdAt).toLocaleString()}</div>
        </div>

        <div>
          <span class="${getStatusClass(item.status)}">${getStatusText(item.status)}</span>
        </div>

        <div class="actions">
          ${item.phone ? `<a href="tel:${item.phone}"><button class="call">${t.call}</button></a>` : ""}
          ${item.address ? `<a href="${mapUrl}" target="_blank"><button class="map">${t.map}</button></a>` : ""}

          ${
            item.status !== "completed"
            ? `
              <button class="processing" onclick="updateStatus(${item.id}, 'processing')">${t.processing}</button>
              <button class="completed" onclick="updateStatus(${item.id}, 'completed')">${t.completed}</button>
            `
            : ""
          }
        </div>

        <div class="reply-card">
          <div class="reply-title">${t.reply}</div>
          <textarea id="reply-${item.id}">${item.adminReply || ""}</textarea>
          <button class="save" onclick="saveReply(${item.id})">${t.save}</button>
        </div>

      </div>
    `;
  });
}

async function updateStatus(id, status) {
  await fetch(API + "/request/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status })
  });

  load();
}

async function saveReply(id) {
  const reply = document.getElementById("reply-" + id).value;

  await fetch(API + "/request/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ adminReply: reply })
  });

  load();
}

search.addEventListener("input", load);

applyLanguage();
load();
</script>

</body>
</html>
