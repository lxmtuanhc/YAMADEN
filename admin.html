<style>
*{box-sizing:border-box}body{margin:0;background:#202020;font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Arial,sans-serif;color:#0f172a}.shell{width:min(1640px,calc(100vw - 32px));height:calc(100vh - 32px);margin:16px auto;background:#f5f7fb;display:grid;grid-template-columns:244px 1fr;overflow:hidden}.side{background:#06111f;color:#e5edf8;padding:16px 12px;overflow:hidden}.brand{display:flex;gap:12px;align-items:center;padding:14px;border:1px solid rgba(255,255,255,.1);border-radius:16px;margin-bottom:18px}.brand img{width:56px;height:56px;border-radius:16px}.brand b{font-size:26px;line-height:1}.brand span{font-size:13px;color:#dbeafe;font-weight:950}.nav button{width:100%;height:48px;border:0;border-radius:11px;background:transparent;color:#d7e2f0;font-size:15px;font-weight:950;text-align:left;padding:0 14px;margin:5px 0;display:flex;align-items:center;justify-content:space-between;cursor:pointer}.nav button.active{background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#fff}.count{min-width:28px;height:24px;border-radius:99px;background:rgba(255,255,255,.12);display:inline-flex;align-items:center;justify-content:center}.main{display:grid;grid-template-rows:74px 1fr;overflow:hidden}.top{background:#fff;border-bottom:1px solid #e5eaf2;display:flex;align-items:center;justify-content:space-between;padding:0 28px}.top h1{margin:0;font-size:24px}.top p{margin:5px 0 0;color:#64748b;font-weight:800}.actions{display:flex;gap:12px;align-items:center}.select,.icon-btn,.admin-box,.logout{height:48px;border-radius:14px;border:1px solid #dbe4ef;background:#fff;padding:0 14px;font-weight:950}.logout{background:#ef4444;color:#fff;border:0;cursor:pointer}.content{overflow:auto;padding:18px 22px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:14px}.kpi{background:#fff;border:1px solid #e5eaf2;border-radius:14px;padding:16px;min-height:112px;box-shadow:0 8px 22px rgba(15,23,42,.06)}.kpi small{font-weight:950;color:#64748b}.kpi b{display:block;font-size:32px;margin-top:12px}.panel{background:#fff;border:1px solid #e5eaf2;border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 8px 22px rgba(15,23,42,.06)}.panel-head{min-height:58px;padding:0 18px;border-bottom:1px solid #edf2f7;display:flex;align-items:center;justify-content:space-between;gap:14px}.panel-head h2{font-size:18px;margin:0}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px;border-bottom:1px solid #edf2f7;text-align:left;font-size:13px;vertical-align:middle}.table th{background:#fbfdff;color:#64748b;font-weight:950}.table tr{cursor:pointer}.tabs{display:flex;gap:8px;flex-wrap:wrap;padding:14px}.tab{height:36px;border:1px solid #dbe4ef;border-radius:9px;background:#fff;color:#334155;font-weight:950;padding:0 13px;cursor:pointer}.tab.active{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.input,textarea,select{border:1px solid #dbe4ef;border-radius:10px;padding:10px;font-weight:800;background:#fff}.search{height:42px;min-width:280px}.pill{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950;background:#eff6ff;color:#1d4ed8}.pill.red{background:#fff1f2;color:#e11d48}.pill.green{background:#ecfdf5;color:#15803d}.pill.orange{background:#fff7ed;color:#c2410c}.btn{height:38px;border-radius:10px;border:0;background:#111827;color:#fff;font-weight:950;padding:0 14px;cursor:pointer}.danger{background:#ef4444}.ghost{background:#fff;color:#111827;border:1px solid #dbe4ef}.form{display:grid;gap:12px;grid-template-columns:1fr 1fr;padding:18px}.form textarea{grid-column:1/-1;min-height:92px}.chart{height:260px;display:grid;grid-template-columns:repeat(7,1fr);align-items:end;gap:10px;padding:20px}.bar{text-align:center;font-weight:950}.bar span{display:block;background:linear-gradient(#2563eb,#0ea5e9);border-radius:8px 8px 0 0;min-height:6px;margin:6px auto;width:38px}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;align-items:center;justify-content:center;padding:20px}.modal.show{display:flex}.box{background:#fff;border-radius:16px;width:min(980px,96vw);max-height:92vh;overflow:auto;padding:22px;position:relative}.close{position:absolute;right:18px;top:18px;width:42px;height:42px;border-radius:10px;background:#ef4444;color:#fff;font-size:0}.close:before,.close:after{content:"";position:absolute;left:50%;top:50%;width:18px;height:3px;background:#fff}.close:before{transform:translate(-50%,-50%) rotate(45deg)}.close:after{transform:translate(-50%,-50%) rotate(-45deg)}.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.info{border-top:1px solid #e5eaf2;padding-top:10px}.info small{display:block;color:#94a3b8;font-weight:950}.history-card{border:1px solid #e5eaf2;border-radius:12px;padding:12px;margin-top:8px}@media(max-width:1100px){.shell{width:100vw;height:100vh;margin:0;grid-template-columns:210px 1fr}.cards{grid-template-columns:repeat(2,1fr)}.form,.info-grid{grid-template-columns:1fr}}
</style>

<body>
<div class="shell"><aside class="side"><div class="brand"><img src="/icon-admin-192.png"><div><b>YAMADEN</b><span>YAMADEN.CO.LTD</span></div></div><nav class="nav"><button data-view="dashboard"></button><button data-view="stats"></button><button data-view="requests"><span></span><em class="count" id="countRequests">0</em></button><button data-view="users"><span></span><em class="count" id="countUsers">0</em></button><button data-view="staff"><span></span><em class="count" id="countStaff">0</em></button><button data-view="quote"></button><button data-view="settings"></button></nav></aside><main class="main"><header class="top"><div><h1 id="pageTitle"></h1><p id="pageSub"></p></div><div class="actions"><button class="icon-btn">🔔 <b id="notifyCount">0</b></button><select id="language" class="select"><option value="ja">日本語</option><option value="vi">Tiếng Việt</option></select><div class="admin-box">● Admin<br><small id="adminRole"></small></div><button class="logout" id="logoutBtn"></button></div></header><section class="content" id="content"></section></main></div><div class="modal" id="modal"><div class="box"><button class="close" id="modalClose"></button><div id="modalContent"></div></div></div>
<script>
const API='https://yamaden.onrender.com';
let lang=localStorage.getItem('language')||'ja';let view='dashboard';let requests=[];let users=[];let staff=[];let statusFilter='all';
const $=id=>document.getElementById(id);
const TEXT={ja:{dashboard:'ダッシュボード',stats:'統計',requests:'管理要求',users:'顧客管理',staff:'スタッフプロフィール',quote:'見積作成',settings:'設定',logout:'ログアウト',admin:'管理者',sub:'依頼と対応状況を管理できます',total:'総依頼数',untreated:'未対応',processing:'対応中',estimating:'見積中',quoted:'見積済み',ordered:'受注',completed:'完了',lost:'失注',top5:'TOP 5 すぐ対応すべき依頼',current:'現在の依頼',id:'ID',content:'内容',customer:'顧客',status:'ステータス',assignee:'担当者',wait:'待機時間',reply:'返信',action:'操作',noData:'データがありません',name:'氏名',phone:'電話番号',email:'メール',dept:'部署',work:'担当作業内容',add:'追加',save:'保存',delete:'削除',block:'停止',approve:'承認',history:'履歴',basic:'基本情報',search:'検索...',quoteSub:'依頼IDを入力すると情報を自動入力します。',load:'読み込み',amount:'見積金額',note:'備考',daily:'日別依頼数',monthly:'月別依頼数',yearly:'年別依頼数',quoteRate:'見積→受注率',claimRate:'クレーム率',pendingUsers:'承認待ち'},vi:{dashboard:'Trang chủ',stats:'Thống kê',requests:'Quản lý yêu cầu',users:'Khách hàng',staff:'Hồ sơ nhân viên',quote:'Tạo báo giá',settings:'Cài đặt',logout:'Đăng xuất',admin:'Quản trị',sub:'Quản lý yêu cầu và tiến độ xử lý',total:'Tổng yêu cầu',untreated:'Chưa xử lý',processing:'Đang xử lý',estimating:'Đang báo giá',quoted:'Đã báo giá',ordered:'Đã nhận đơn',completed:'Hoàn thành',lost:'Không hoàn thành',top5:'TOP 5 yêu cầu cần xử lý',current:'Các yêu cầu hiện có',id:'ID',content:'Nội dung',customer:'Khách hàng',status:'Trạng thái',assignee:'Phụ trách',wait:'Thời gian chờ',reply:'Phản hồi',action:'Thao tác',noData:'Không có dữ liệu',name:'Tên',phone:'Số điện thoại',email:'Gmail',dept:'Bộ phận',work:'Nội dung công việc',add:'Thêm mới',save:'Lưu',delete:'Xóa',block:'Khóa',approve:'Duyệt',history:'Lịch sử',basic:'Thông tin',search:'Tìm kiếm...',quoteSub:'Nhập ID yêu cầu để tự động điền thông tin.',load:'Tải thông tin',amount:'Số tiền báo giá',note:'Ghi chú',daily:'Yêu cầu theo ngày',monthly:'Yêu cầu theo tháng',yearly:'Yêu cầu theo năm',quoteRate:'Tỉ lệ báo giá→đơn',claimRate:'Tỉ lệ claim',pendingUsers:'Chờ duyệt'}};
const DEPTS=['設計部','工務部','営業部','工事部','FS部','人事・経理部','社長'];
function T(k){return (TEXT[lang]&&TEXT[lang][k])||k}function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function token(){return {Authorization:'Bearer '+localStorage.getItem('adminToken')}}function auth(){if(!localStorage.getItem('adminToken')) location.href='/login.html'}async function api(path,opt={}){opt.headers={...(opt.headers||{}),...token()};const r=await fetch(API+path,opt);if(r.status===401)location.href='/login.html';return r}async function safe(path){try{const r=await api(path);return await r.json()}catch{return []}}function norm(s){s=String(s||'untreated');if(s==='pending')return'untreated';if(s==='contacted')return'processing';return s}function rid(r){return r.id||r.requestId||r._id||'-'}function title(r){return r.content||r.title||'-'}function cname(r){return r.name||r.customerName||'-'}function elapsed(d){if(!d)return'-';const h=Math.max(1,Math.floor((Date.now()-new Date(d).getTime())/36e5));return h+'h'}
async function load(){requests=await safe('/requests');users=await safe('/admin/users');staff=await safe('/admin/staff');render()}function setLang(v){lang=v==='vi'?'vi':'ja';localStorage.setItem('language',lang);render()}function logout(){localStorage.removeItem('adminToken');localStorage.removeItem('loginTime');location.href='/login.html'}function showView(v){view=v;render()}function shell(){document.documentElement.lang=lang;$('language').value=lang;$('adminRole').textContent=T('admin');$('logoutBtn').textContent=T('logout');document.querySelector('[data-view="dashboard"]').textContent=T('dashboard');document.querySelector('[data-view="stats"]').textContent=T('stats');document.querySelector('[data-view="quote"]').textContent=T('quote');document.querySelector('[data-view="settings"]').textContent=T('settings');document.querySelector('[data-view="requests"] span').textContent=T('requests');document.querySelector('[data-view="users"] span').textContent=T('users');document.querySelector('[data-view="staff"] span').textContent=T('staff');$('countRequests').textContent=requests.length;$('countUsers').textContent=users.length;$('countStaff').textContent=staff.length;$('notifyCount').textContent=requests.filter(r=>norm(r.status)==='untreated').length;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));$('pageTitle').textContent=T(view);$('pageSub').textContent=T('sub')}function render(){shell();({dashboard:renderDashboard,stats:renderStats,requests:renderRequests,users:renderUsers,staff:renderStaff,quote:renderQuote,settings:renderSettings}[view]||renderDashboard)()}function kpis(){const st=k=>requests.filter(r=>norm(r.status)===k).length;return '<div class="cards">'+[['total',requests.length],['untreated',st('untreated')],['quoteRate','0%'],['claimRate','2.1%'],['processing',st('processing')]].map(x=>'<div class="kpi"><small>'+T(x[0])+'</small><b>'+x[1]+'</b></div>').join('')+'</div>'}function row(r){return '<tr data-request="'+esc(r._id||r.id)+'"><td>'+esc(rid(r))+'</td><td>'+esc(title(r))+'</td><td>'+esc(cname(r))+'<br><small>'+esc(r.phone||'')+'</small></td><td><span class="pill '+(norm(r.status)==='untreated'?'red':norm(r.status)==='completed'?'green':'orange')+'">'+T(norm(r.status))+'</span></td><td>'+esc(r.assigneeName||'-')+'</td><td>'+elapsed(r.createdAt)+'</td></tr>'}function requestTable(arr){return '<table class="table"><thead><tr><th>'+T('id')+'</th><th>'+T('content')+'</th><th>'+T('customer')+'</th><th>'+T('status')+'</th><th>'+T('assignee')+'</th><th>'+T('wait')+'</th></tr></thead><tbody>'+(arr.length?arr.map(row).join(''):'<tr><td colspan="6" style="text-align:center;padding:30px;color:#64748b">'+T('noData')+'</td></tr>')+'</tbody></table>'}function bindRequests(){document.querySelectorAll('[data-request]').forEach(tr=>tr.onclick=()=>openRequest(tr.dataset.request))}
function renderDashboard(){const top=requests.slice(0,5);$('content').innerHTML=kpis()+'<div class="panel"><div class="panel-head"><h2>'+T('top5')+'</h2></div><div class="table-wrap">'+requestTable(top)+'</div></div><div class="panel"><div class="panel-head"><h2>'+T('current')+'</h2></div><div class="table-wrap">'+requestTable(requests)+'</div></div>';bindRequests()}function renderRequests(){const tabs=['all','untreated','processing','estimating','quoted','ordered','completed','lost'];const list=statusFilter==='all'?requests:requests.filter(r=>norm(r.status)===statusFilter);$('content').innerHTML='<div class="panel"><div class="tabs">'+tabs.map(s=>'<button class="tab '+(statusFilter===s?'active':'')+'" data-status="'+s+'">'+(s==='all'?T('total'):T(s))+'</button>').join('')+'</div><div class="table-wrap">'+requestTable(list)+'</div></div>';document.querySelectorAll('[data-status]').forEach(b=>b.onclick=()=>{statusFilter=b.dataset.status;renderRequests()});bindRequests()}function renderStats(){const days=[...Array(7)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d});const max=Math.max(1,...days.map(d=>requests.filter(r=>new Date(r.createdAt).toDateString()===d.toDateString()).length));$('content').innerHTML=kpis()+'<div class="panel"><div class="panel-head"><h2>'+T('daily')+'</h2></div><div class="chart">'+days.map(d=>{const v=requests.filter(r=>new Date(r.createdAt).toDateString()===d.toDateString()).length;return '<div class="bar"><b>'+v+'</b><span style="height:'+Math.max(6,v/max*190)+'px"></span><small>'+(d.getMonth()+1)+'/'+d.getDate()+'</small></div>'}).join('')+'</div></div><div class="panel"><div class="panel-head"><h2>'+T('monthly')+'</h2></div><div style="padding:30px;color:#64748b">'+T('noData')+'</div></div>'}
function renderUsers(){$('content').innerHTML='<div class="panel"><div class="panel-head"><h2>'+T('users')+'</h2><input id="userSearch" class="input search" placeholder="'+T('search')+'"></div><div id="usersList"></div></div>';$('userSearch').oninput=()=>drawUsers($('userSearch').value);drawUsers('')}function drawUsers(q){q=String(q||'').toLowerCase();const arr=users.filter(u=>[u.name,u.phone,u.email,u.company,u.province].join(' ').toLowerCase().includes(q));$('usersList').innerHTML='<table class="table"><tbody>'+(arr.length?arr.map(u=>'<tr data-user="'+esc(u._id)+'"><td><b>'+esc(u.name||u.phone)+'</b><br>'+esc(u.phone||'')+'</td><td>'+esc(u.email||'-')+'</td><td><span class="pill '+(u.status==='active'?'green':'orange')+'">'+esc(u.status||'pending')+'</span></td><td><button class="btn approve" data-user-id="'+esc(u._id)+'">'+T('approve')+'</button> <button class="btn danger delete-user" data-user-id="'+esc(u._id)+'">'+T('delete')+'</button></td></tr>').join(''):'<tr><td>'+T('noData')+'</td></tr>')+'</tbody></table>';document.querySelectorAll('[data-user]').forEach(tr=>tr.onclick=e=>{if(e.target.closest('button'))return;openUser(tr.dataset.user)});document.querySelectorAll('.approve').forEach(b=>b.onclick=()=>updateUser(b.dataset.userId,'active'));document.querySelectorAll('.delete-user').forEach(b=>b.onclick=()=>deleteUser(b.dataset.userId))}
function renderStaff(){$('content').innerHTML='<div class="panel"><div class="panel-head"><h2>'+T('staff')+'</h2><button class="btn" id="addStaff">+ '+T('add')+'</button></div><table class="table"><thead><tr><th>AVT</th><th>'+T('name')+'</th><th>'+T('dept')+'</th><th>'+T('email')+'</th><th>'+T('action')+'</th></tr></thead><tbody>'+(staff.length?staff.map(s=>'<tr data-staff="'+esc(s._id)+'"><td>'+(s.avatar?'<img src="'+esc(s.avatar)+'" style="width:44px;height:44px;border-radius:14px;object-fit:cover">':'-')+'</td><td>'+esc(s.name||'-')+'</td><td>'+esc(s.department||s.areas||'-')+'</td><td>'+esc(s.email||'-')+'</td><td><button class="btn ghost edit-staff" data-staff-id="'+esc(s._id)+'">'+T('save')+'</button></td></tr>').join(''):'<tr><td colspan="5">'+T('noData')+'</td></tr>')+'</tbody></table></div>';$('addStaff').onclick=()=>openStaffForm();document.querySelectorAll('[data-staff]').forEach(tr=>tr.onclick=e=>{if(e.target.closest('button'))return;openStaff(tr.dataset.staff)});document.querySelectorAll('.edit-staff').forEach(b=>b.onclick=()=>openStaffForm(b.dataset.staffId))}function renderQuote(){$('content').innerHTML='<div class="panel"><div class="panel-head"><div><h2>'+T('quote')+'</h2><small>'+T('quoteSub')+'</small></div></div><div class="form"><input id="quoteId" class="input" placeholder="ID"><button class="btn" id="loadQuote">'+T('load')+'</button><input id="quoteCustomer" class="input" placeholder="'+T('customer')+'"><input id="quoteAmount" class="input" placeholder="'+T('amount')+'"><textarea id="quoteNote" placeholder="'+T('note')+'"></textarea><button class="btn">'+T('save')+'</button></div></div>';$('loadQuote').onclick=loadQuote}function renderSettings(){$('content').innerHTML='<div class="panel"><div class="panel-head"><h2>'+T('settings')+'</h2></div><div style="padding:18px;color:#64748b;font-weight:850">Slack / AI / KPI settings</div></div>'}
function openModal(html){$('modalContent').innerHTML=html;$('modal').classList.add('show')}function closeModal(){$('modal').classList.remove('show')}function openRequest(id){const r=requests.find(x=>String(x._id||x.id)===String(id));if(!r)return;openModal('<h2>'+esc(rid(r))+'</h2><div class="info-grid"><div class="info"><small>'+T('customer')+'</small><b>'+esc(cname(r))+'</b></div><div class="info"><small>'+T('phone')+'</small><b>'+esc(r.phone||'-')+'</b></div><div class="info"><small>'+T('status')+'</small><b>'+T(norm(r.status))+'</b></div><div class="info"><small>'+T('assignee')+'</small><b>'+esc(r.assigneeName||'-')+'</b></div></div><p><b>'+T('content')+':</b><br>'+esc(title(r))+'</p><textarea id="replyBox" style="width:100%;min-height:90px">'+esc(r.adminReply||'')+'</textarea><button class="btn" id="saveReplyBtn">'+T('save')+'</button>');$('saveReplyBtn').onclick=()=>saveReply(r._id||r.id)}async function saveReply(id){await api('/request/'+encodeURIComponent(id),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminReply:$('replyBox').value})});closeModal();load()}async function updateUser(id,status){await api('/admin/users/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});load()}async function deleteUser(id){if(confirm(T('delete')+'?')){await api('/admin/users/'+id,{method:'DELETE'});load()}}function openUser(id){const u=users.find(x=>String(x._id)===String(id));if(!u)return;openModal('<h2>'+esc(u.name||u.phone)+'</h2><div class="tabs"><button class="tab active" id="userBasic">'+T('basic')+'</button><button class="tab" id="userHistoryTab">'+T('history')+'</button></div><div id="userModalBody"></div>');$('userBasic').onclick=()=>drawUserBasic(u);$('userHistoryTab').onclick=()=>drawUserHistory(u);drawUserBasic(u)}function drawUserBasic(u){$('userBasic').classList.add('active');$('userHistoryTab').classList.remove('active');$('userModalBody').innerHTML='<div class="info-grid">'+[[T('name'),u.name],[T('phone'),u.phone],[T('email'),u.email],[T('dept'),u.company],[T('status'),u.status],[T('requests'),u.requestCount||'-'],['地域',u.province],['工事件名',u.projectName]].map(x=>'<div class="info"><small>'+esc(x[0])+'</small><b>'+esc(x[1]||'-')+'</b></div>').join('')+'</div>'}function drawUserHistory(u){$('userHistoryTab').classList.add('active');$('userBasic').classList.remove('active');$('userModalBody').innerHTML='Loading...';api('/admin/users/'+u._id+'/requests').then(r=>r.json()).then(a=>{$('userModalBody').innerHTML=(Array.isArray(a)&&a.length)?a.map(r=>'<div class="history-card">#'+esc(rid(r))+' '+esc(title(r))+'</div>').join(''):T('noData')})}
function openStaff(id){const s=staff.find(x=>String(x._id)===String(id));if(!s)return;const hist=requests.filter(r=>r.assigneeId===id||r.assigneeName===s.name);openModal('<h2>'+esc(s.name||'-')+'</h2><div class="info-grid"><div class="info"><small>'+T('email')+'</small><b>'+esc(s.email||'-')+'</b></div><div class="info"><small>'+T('dept')+'</small><b>'+esc(s.department||s.areas||'-')+'</b></div><div class="info"><small>'+T('work')+'</small><b>'+esc((s.workTags||[]).join(', ')||s.workContent||s.skills||'-')+'</b></div></div><h3>'+T('history')+'</h3>'+(hist.length?hist.map(r=>'<div class="history-card">#'+esc(rid(r))+' '+esc(title(r))+'</div>').join(''):T('noData')))}function openStaffForm(){openModal('<h2>'+T('staff')+'</h2><div class="form"><input id="sfName" class="input" placeholder="'+T('name')+'"><input id="sfEmail" class="input" placeholder="'+T('email')+'"><select id="sfDept" class="input">'+DEPTS.map(d=>'<option>'+d+'</option>').join('')+'</select><input id="sfWork" class="input" placeholder="'+T('work')+'"><input id="sfAvatar" type="file"><button class="btn" id="saveStaffBtn">'+T('save')+'</button></div>');$('saveStaffBtn').onclick=saveStaff}async function saveStaff(){const fd=new FormData();fd.append('name',$('sfName').value);fd.append('email',$('sfEmail').value);fd.append('department',$('sfDept').value);fd.append('areas',$('sfDept').value);fd.append('workContent',$('sfWork').value);fd.append('skills',$('sfWork').value);if($('sfAvatar').files[0])fd.append('avatar',$('sfAvatar').files[0]);await api('/admin/staff',{method:'POST',body:fd});closeModal();load()}function loadQuote(){const q=$('quoteId').value.toLowerCase();const r=requests.find(x=>String(rid(x)).toLowerCase().includes(q));if(r){$('quoteCustomer').value=cname(r);$('quoteNote').value=title(r)}}
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>showView(b.dataset.view));$('language').onchange=e=>setLang(e.target.value);$('logoutBtn').onclick=logout;$('modalClose').onclick=closeModal;auth();load();
</script>
