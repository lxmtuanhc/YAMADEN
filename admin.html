<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - YAMADEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="/icon-admin-192.png">
<link rel="apple-touch-icon" href="/icon-admin-192.png">
<link rel="manifest" href="/admin-manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
* { box-sizing: border-box; }

:root {
  --dark: #0f172a;
  --dark2: #111827;
  --blue: #2563eb;
  --red: #dc2626;
  --green: #16a34a;
  --orange: #f59e0b;
  --bg: #f3f6fb;
  --line: #e5e7eb;
  --text: #111827;
  --muted: #64748b;
  --card: #ffffff;
}

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(37,99,235,0.08), transparent 35%),
    linear-gradient(180deg, #f8fafc, #eef2f7);
  color: var(--text);
}

.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: linear-gradient(180deg, #0f172a, #111827);
  color: white;
  padding: 22px 16px;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
  cursor: pointer;
}

.brand img {
  width: 52px;
  height: 52px;
  border-radius: 15px;
  background: white;
  box-shadow: 0 10px 24px rgba(0,0,0,0.28);
}

.brand-title {
  font-size: 24px;
  font-weight: 950;
  letter-spacing: 0.4px;
}

.brand-sub {
  font-size: 12px;
  color: #cbd5e1;
  font-weight: 700;
}

.menu-title {
  color: #94a3b8;
  font-size: 12px;
  font-weight: 900;
  margin: 22px 12px 10px;
}

.menu-item {
  padding: 13px 14px;
  border-radius: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  font-weight: 800;
  color: #e5e7eb;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu-item:hover {
  background: rgba(255,255,255,0.08);
}

.menu-item.active {
  background: var(--blue);
  color: white;
  box-shadow: 0 10px 22px rgba(37,99,235,0.28);
}

.menu-badge {
  background: rgba(255,255,255,0.16);
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 12px;
}

.sidebar-footer {
  margin-top: auto;
  color: #cbd5e1;
  font-size: 12px;
  line-height: 1.6;
}

.main {
  min-width: 0;
}

.topbar {
  min-height: 82px;
  background: rgba(255,255,255,0.86);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.mobile-brand {
  display: none;
  align-items: center;
  gap: 10px;
}

.mobile-brand img {
  width: 46px;
  height: 46px;
  border-radius: 14px;
}

.page-title {
  font-size: 24px;
  line-height: 1.25;
  font-weight: 950;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.lang {
  padding: 11px 14px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
  font-weight: 900;
  background: white;
}

.admin-info {
  font-weight: 900;
  color: #111827;
}

.logout-btn {
  padding: 11px 16px;
  border: none;
  border-radius: 16px;
  background: var(--red);
  color: white;
  font-weight: 950;
  cursor: pointer;
  box-shadow: 0 10px 22px rgba(220,38,38,0.2);
}

.content {
  width: 100%;
  max-width: 1280px;
  margin: 0 auto;
  padding: 26px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  margin-bottom: 24px;
}

.stat {
  background: rgba(255,255,255,0.92);
  border-radius: 24px;
  padding: 24px;
  border: 1px solid rgba(229,231,235,0.95);
  box-shadow: 0 12px 32px rgba(15,23,42,0.08);
}

.stat-label {
  color: var(--muted);
  font-size: 14px;
  font-weight: 800;
  margin-bottom: 10px;
}

.stat-number {
  font-size: 38px;
  font-weight: 950;
}

.panel {
  background: rgba(255,255,255,0.96);
  border-radius: 26px;
  border: 1px solid rgba(229,231,235,0.95);
  box-shadow: 0 16px 40px rgba(15,23,42,0.08);
  overflow: hidden;
}

.toolbar {
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 90px;
  gap: 14px;
  border-bottom: 1px solid var(--line);
}

.search {
  width: 100%;
  padding: 15px 18px;
  border-radius: 18px;
  border: 1px solid #d1d5db;
  font-size: 15px;
  outline: none;
}

.search:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 5px rgba(37,99,235,0.1);
}

.search-btn {
  border: none;
  border-radius: 18px;
  padding: 14px 22px;
  background: var(--dark);
  color: white;
  font-weight: 950;
  cursor: pointer;
  font-size: 18px;
}

.tabs {
  display: flex;
  gap: 28px;
  padding: 0 20px;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
}

.tabs button {
  background: none;
  border: none;
  padding: 18px 4px;
  font-weight: 950;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 3px solid transparent;
  white-space: nowrap;
}

.tabs button.active {
  color: var(--blue);
  border-bottom-color: var(--blue);
}

.request {
  display: grid;
  grid-template-columns: 140px minmax(240px, 1fr) 120px 190px 270px;
  gap: 16px;
  padding: 20px;
  border-bottom: 1px solid var(--line);
  align-items: center;
}

.request:last-child { border-bottom: none; }

.req-img {
  width: 140px;
  height: 105px;
  object-fit: cover;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: #f1f5f9;
}

.req-id {
  color: var(--blue);
  font-weight: 950;
  margin-bottom: 8px;
}

.req-name {
  font-size: 18px;
  font-weight: 950;
}

.req-phone {
  color: var(--blue);
  font-weight: 900;
  margin-left: 10px;
}

.req-line {
  margin-top: 7px;
  color: #475569;
  line-height: 1.45;
  word-break: break-word;
}

.badge {
  display: inline-block;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 950;
}

.status-pending { background: #e5e7eb; color: #111; }
.status-processing { background: #fff1d6; color: #b45309; }
.status-completed { background: #dcfce7; color: #166534; }

.actions a {
  text-decoration: none;
}

.actions button {
  width: 100%;
  margin-bottom: 9px;
  padding: 12px;
  border: none;
  border-radius: 15px;
  color: white;
  font-weight: 950;
  cursor: pointer;
}

.call { background: var(--green); }
.map { background: var(--blue); }
.processing { background: var(--orange); }
.completed { background: var(--dark2); }
.delete { background: var(--red); }

.reply-card {
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 14px;
  background: #fafafa;
}

.reply-title {
  font-weight: 950;
  margin-bottom: 8px;
}

.reply-card textarea {
  width: 100%;
  min-height: 90px;
  padding: 12px;
  border-radius: 15px;
  border: 1px solid #d1d5db;
  resize: vertical;
  font-size: 14px;
  outline: none;
}

.reply-card textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px rgba(37,99,235,0.08);
}

.save {
  width: 100%;
  margin-top: 8px;
  padding: 11px;
  border: none;
  border-radius: 15px;
  background: var(--dark);
  color: white;
  font-weight: 950;
  cursor: pointer;
}

.empty {
  padding: 40px;
  text-align: center;
  color: var(--muted);
  font-weight: 800;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.55);
  backdrop-filter: blur(5px);
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 18px;
}

.modal-box {
  background: white;
  width: 380px;
  max-width: 100%;
  border-radius: 26px;
  padding: 28px;
  text-align: center;
  box-shadow: 0 25px 70px rgba(0,0,0,0.28);
  animation: modalPop 0.2s ease;
}

.modal-icon {
  width: 62px;
  height: 62px;
  border-radius: 50%;
  background: #fee2e2;
  color: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin: 0 auto 16px;
}

.modal-title {
  font-size: 21px;
  font-weight: 950;
  color: #111827;
  margin-bottom: 10px;
}

.modal-text {
  color: #4b5563;
  font-size: 15px;
  line-height: 1.5;
  margin: 0 0 24px;
  font-weight: 700;
}

.modal-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.modal-btn {
  padding: 13px;
  border: none;
  border-radius: 16px;
  font-weight: 950;
  cursor: pointer;
  font-size: 15px;
}

.modal-cancel {
  background: #e5e7eb;
  color: #111827;
}

.modal-delete {
  background: var(--red);
  color: white;
}

@keyframes modalPop {
  from { transform: scale(0.92); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@media (max-width: 1400px) {
  .request {
    grid-template-columns: 130px minmax(220px, 1fr) 110px 170px 250px;
  }
}

@media (max-width: 1200px) {
  .layout {
    grid-template-columns: 1fr;
  }

  .sidebar {
    display: none;
  }

  .mobile-brand {
    display: flex;
  }

  .topbar {
    align-items: flex-start;
    gap: 14px;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .stats {
    grid-template-columns: repeat(2, 1fr);
  }

  .request {
    grid-template-columns: 1fr;
    align-items: stretch;
  }

  .req-img {
    width: 100%;
    height: 210px;
  }

  .actions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 9px;
  }

  .actions button {
    margin-bottom: 0;
  }
}

@media (max-width: 700px) {
  .topbar {
    padding: 18px 16px;
    flex-direction: column;
    position: sticky;
  }

  .topbar-left {
    width: 100%;
  }

  .page-title {
    font-size: 26px;
  }

  .top-actions {
    width: 100%;
    display: grid;
    grid-template-columns: 96px 1fr 126px;
    gap: 10px;
  }

  .lang {
    width: 100%;
    text-align: center;
    font-size: 16px;
  }

  .admin-info {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logout-btn {
    width: 100%;
    min-height: 54px;
    font-size: 15px;
  }

  .content {
    padding: 16px;
  }

  .stats {
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .stat {
    border-radius: 24px;
    padding: 26px;
  }

  .stat-number {
    font-size: 42px;
  }

  .toolbar {
    grid-template-columns: 1fr;
    padding: 18px;
  }

  .search,
  .search-btn {
    min-height: 58px;
    font-size: 18px;
  }

  .tabs {
    gap: 26px;
    padding: 0 18px;
  }

  .tabs button {
    font-size: 16px;
  }

  .request {
    padding: 18px;
  }

  .req-img {
    height: 190px;
  }

  .req-name {
    display: block;
    margin-bottom: 5px;
  }

  .req-phone {
    display: block;
    margin-left: 0;
  }

  .actions {
    grid-template-columns: 1fr;
  }

  .reply-card textarea {
    min-height: 110px;
  }
}

@media (max-width: 420px) {
  .page-title {
    font-size: 24px;
  }

  .top-actions {
    grid-template-columns: 86px 1fr 116px;
  }

  .logout-btn {
    padding: 10px;
  }
}
</style>
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <div class="brand" onclick="logoReload()">
      <img src="/icon-admin-192.png" alt="YAMADEN Admin">
      <div>
        <div class="brand-title">YAMADEN</div>
        <div class="brand-sub">Admin Dashboard</div>
      </div>
    </div>

    <div class="menu-item active" id="menuOverview">🏠 Tổng quan</div>

    <div class="menu-title" id="menuRequestTitle">QUẢN LÝ YÊU CẦU</div>

    <div class="menu-item" onclick="changeTab('active')">
      🕒 <span id="menuActiveText">Đang xử lý</span>
      <span class="menu-badge" id="sideActive">0</span>
    </div>

    <div class="menu-item" onclick="changeTab('done')">
      ✅ <span id="menuDoneText">Hoàn thành</span>
      <span class="menu-badge" id="sideDone">0</span>
    </div>

    <div class="menu-title" id="menuSettingTitle">CÀI ĐẶT</div>
    <div class="menu-item" id="menuSetting">⚙️ Cài đặt</div>

    <div class="sidebar-footer">
      © 2026 YAMADEN<br>
      Customer Request System
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="mobile-brand">
          <img src="/icon-admin-192.png" alt="YAMADEN Admin">
        </div>
        <div class="page-title" id="pageTitle">Quản lý yêu cầu khách hàng</div>
      </div>

      <div class="top-actions">
        <select class="lang" id="language" onchange="changeLanguage()">
          <option value="vi">VI</option>
          <option value="ja">JP</option>
        </select>
        <div class="admin-info">Admin</div>
        <button class="logout-btn" id="logoutBtn" onclick="logout()">Đăng xuất</button>
      </div>
    </div>

    <div class="content">

      <div class="stats">
        <div class="stat">
          <div class="stat-label" id="labelTotal">Tổng yêu cầu</div>
          <div class="stat-number" id="total">0</div>
        </div>

        <div class="stat">
          <div class="stat-label" id="labelActive">Đang xử lý</div>
          <div class="stat-number" id="active">0</div>
        </div>

        <div class="stat">
          <div class="stat-label" id="labelDone">Hoàn thành</div>
          <div class="stat-number" id="done">0</div>
        </div>

        <div class="stat">
          <div class="stat-label" id="labelToday">Hôm nay</div>
          <div class="stat-number" id="today">0</div>
        </div>
      </div>

      <div class="panel">
        <div class="toolbar">
          <input class="search" id="search" placeholder="🔍 Tìm theo tên, SĐT, địa chỉ...">
          <button class="search-btn" id="searchBtn" onclick="load()">🔍</button>
        </div>

        <div class="tabs">
          <button id="tabActive" class="active" onclick="changeTab('active')">Đang xử lý</button>
          <button id="tabDone" onclick="changeTab('done')">Hoàn thành</button>
        </div>

        <div id="list"></div>
      </div>

    </div>
  </main>

</div>

<script>
const adminToken = localStorage.getItem("adminToken");
const loginTime = localStorage.getItem("loginTime");

if (!adminToken || !loginTime || Date.now() - loginTime > 86400000) {
  localStorage.removeItem("adminToken");
  localStorage.removeItem("loginTime");
  window.location.href = "/login.html";
}

function logout() {
  localStorage.removeItem("adminToken");
  localStorage.removeItem("loginTime");
  window.location.href = "/login.html";
}

const API = "https://yamaden.onrender.com";

function apiFetch(url, options = {}) {
  const token = localStorage.getItem("adminToken");

  options.headers = {
    ...(options.headers || {}),
    "Authorization": "Bearer " + token
  };

  return fetch(url, options);
}

function authFailLogout() {
  localStorage.removeItem("adminToken");
  localStorage.removeItem("loginTime");
  window.location.href = "/login.html";
}

let currentLang = localStorage.getItem("language") || "vi";
let currentTab = "active";
let deleteId = null;

const texts = {
  vi: {
    pageTitle: "Quản lý yêu cầu khách hàng",
    total: "Tổng yêu cầu",
    active: "Đang xử lý",
    done: "Hoàn thành",
    today: "Hôm nay",
    search: "🔍 Tìm theo tên, SĐT, địa chỉ...",
    call: "📞 Gọi",
    map: "📍 Bản đồ",
    processing: "Đang xử lý",
    completed: "Hoàn thành",
    pending: "Mới tiếp nhận",
    reply: "Phản hồi khách hàng",
    save: "Lưu phản hồi",
    delete: "Xóa",
    confirmTitle: "Xác nhận xóa",
    confirmDelete: "Bạn có chắc muốn xóa yêu cầu này?",
    cancel: "Hủy",
    empty: "Không có yêu cầu nào",
    menuOverview: "Tổng quan",
    menuRequestTitle: "QUẢN LÝ YÊU CẦU",
    menuSettingTitle: "CÀI ĐẶT",
    menuSetting: "Cài đặt",
    logout: "Đăng xuất",
    unsaved: "Bạn có phản hồi chưa lưu. Vẫn tải lại?"
  },
  ja: {
    pageTitle: "お客様リクエスト管理",
    total: "総依頼数",
    active: "処理中",
    done: "完了",
    today: "本日",
    search: "🔍 名前、電話番号、住所で検索...",
    call: "📞 電話",
    map: "📍 地図",
    processing: "処理中",
    completed: "完了",
    pending: "受付済み",
    reply: "お客様への返信",
    save: "返信を保存",
    delete: "削除",
    confirmTitle: "削除の確認",
    confirmDelete: "この依頼を削除してもよろしいですか？",
    cancel: "キャンセル",
    empty: "依頼はありません",
    menuOverview: "概要",
    menuRequestTitle: "依頼管理",
    menuSettingTitle: "設定",
    menuSetting: "設定",
    logout: "ログアウト",
    unsaved: "保存していない返信があります。再読み込みしますか？"
  }
};

function safeId(id) {
  return String(id).replace(/'/g, "\\'");
}

function escapeHtml(text) {
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function hasUnsavedReply() {
  const boxes = document.querySelectorAll("textarea[id^='reply-']");

  for (const box of boxes) {
    if (box.dataset.original !== undefined && box.value !== box.dataset.original) {
      return true;
    }
  }

  return false;
}

function logoReload() {
  const t = texts[currentLang];

  if (hasUnsavedReply()) {
    if (!confirm(t.unsaved)) return;
  }

  load();
}

function applyLanguage() {
  const t = texts[currentLang];

  language.value = currentLang;
  pageTitle.innerText = t.pageTitle;
  labelTotal.innerText = t.total;
  labelActive.innerText = t.active;
  labelDone.innerText = t.done;
  labelToday.innerText = t.today;
  search.placeholder = t.search;

  menuOverview.innerText = "🏠 " + t.menuOverview;
  menuRequestTitle.innerText = t.menuRequestTitle;
  menuActiveText.innerText = t.active;
  menuDoneText.innerText = t.done;
  menuSettingTitle.innerText = t.menuSettingTitle;
  menuSetting.innerText = "⚙️ " + t.menuSetting;
  logoutBtn.innerText = t.logout;

  modalTitle.innerText = t.confirmTitle;
  modalCancelBtn.innerText = t.cancel;
  modalDeleteBtn.innerText = t.delete;

  updateTabLabels();
}

function changeLanguage() {
  currentLang = language.value;
  localStorage.setItem("language", currentLang);
  applyLanguage();
  load();
}

function changeTab(tab) {
  currentTab = tab;

  tabActive.classList.remove("active");
  tabDone.classList.remove("active");

  if (tab === "active") {
    tabActive.classList.add("active");
  } else {
    tabDone.classList.add("active");
  }

  load();
}

function updateTabLabels(activeCount = null, doneCount = null) {
  const t = texts[currentLang];

  if (activeCount === null || doneCount === null) {
    tabActive.innerText = t.active;
    tabDone.innerText = t.done;
  } else {
    tabActive.innerText = `${t.active} (${activeCount})`;
    tabDone.innerText = `${t.done} (${doneCount})`;
    sideActive.innerText = activeCount;
    sideDone.innerText = doneCount;
  }
}

function getStatusClass(status) {
  if (status === "processing") return "badge status-processing";
  if (status === "completed") return "badge status-completed";
  return "badge status-pending";
}

function getStatusText(status) {
  const t = texts[currentLang];

  if (status === "processing") return t.processing;
  if (status === "completed") return t.completed;
  return t.pending;
}

function isToday(dateString) {
  const d = new Date(dateString);
  const now = new Date();

  return d.getFullYear() === now.getFullYear()
    && d.getMonth() === now.getMonth()
    && d.getDate() === now.getDate();
}

async function load() {
  const t = texts[currentLang];

  const res = await apiFetch(API + "/requests");

  if (res.status === 401) {
    authFailLogout();
    return;
  }

  const data = await res.json();

  const activeCount = data.filter(item => item.status !== "completed").length;
  const doneCount = data.filter(item => item.status === "completed").length;
  const todayCount = data.filter(item => isToday(item.createdAt)).length;

  total.innerText = data.length;
  active.innerText = activeCount;
  done.innerText = doneCount;
  today.innerText = todayCount;

  updateTabLabels(activeCount, doneCount);

  const keyword = search.value.toLowerCase();

  const filtered = data.filter(item => {
    const match =
      String(item.id || "").toLowerCase().includes(keyword) ||
      (item.name || "").toLowerCase().includes(keyword) ||
      (item.phone || "").toLowerCase().includes(keyword) ||
      (item.address || "").toLowerCase().includes(keyword) ||
      (item.content || "").toLowerCase().includes(keyword);

    if (currentTab === "active") {
      return match && item.status !== "completed";
    }

    return match && item.status === "completed";
  });

  list.innerHTML = "";

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">${t.empty}</div>`;
    return;
  }

  filtered.forEach(item => {
    const id = safeId(item.id);
    const reply = escapeHtml(item.adminReply || "");
    const mapUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(item.address || "");

    list.innerHTML += `
      <div class="request">

        <div>
          ${
            item.image
            ? `<img class="req-img" src="${item.image}">`
            : `<div class="req-img"></div>`
          }
        </div>

        <div>
          <div class="req-id">#${item.id}</div>
          <div>
            <span class="req-name">${item.name || ""}</span>
            <span class="req-phone">${item.phone || ""}</span>
          </div>

          <div class="req-line">📍 ${item.address || ""}</div>
          <div class="req-line">${item.content || ""}</div>
          <div class="req-line">🕒 ${new Date(item.createdAt).toLocaleString()}</div>
        </div>

        <div>
          <span class="${getStatusClass(item.status)}">${getStatusText(item.status)}</span>
        </div>

        <div class="actions">
          ${item.phone ? `<a href="tel:${item.phone}"><button class="call">${t.call}</button></a>` : ""}
          ${item.address ? `<a href="${mapUrl}" target="_blank"><button class="map">${t.map}</button></a>` : ""}

          ${
            item.status !== "completed"
            ? `
              <button class="processing" onclick="updateStatus('${id}', 'processing')">${t.processing}</button>
              <button class="completed" onclick="updateStatus('${id}', 'completed')">${t.completed}</button>
            `
            : `
              <button class="delete" onclick="deleteRequest('${id}')">🗑️ ${t.delete}</button>
            `
          }
        </div>

        <div class="reply-card">
          <div class="reply-title">${t.reply}</div>
          <textarea id="reply-${item.id}" data-original="${reply}">${reply}</textarea>
          <button class="save" onclick="saveReply('${id}')">${t.save}</button>
        </div>

      </div>
    `;
  });
}

async function updateStatus(id, status) {
  const res = await apiFetch(API + "/request/" + encodeURIComponent(id), {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status })
  });

  if (res.status === 401) {
    authFailLogout();
    return;
  }

  load();
}

async function saveReply(id) {
  const reply = document.getElementById("reply-" + id).value;

  const res = await apiFetch(API + "/request/" + encodeURIComponent(id), {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ adminReply: reply })
  });

  if (res.status === 401) {
    authFailLogout();
    return;
  }

  load();
}

function deleteRequest(id) {
  const t = texts[currentLang];

  deleteId = id;
  modalText.innerText = t.confirmDelete;
  modal.style.display = "flex";
}

function closeModal() {
  modal.style.display = "none";
  deleteId = null;
}

async function confirmDelete() {
  if (deleteId === null) return;

  const res = await apiFetch(API + "/request/" + encodeURIComponent(deleteId), {
    method: "DELETE"
  });

  if (res.status === 401) {
    authFailLogout();
    return;
  }

  closeModal();
  load();
}

search.addEventListener("input", load);

applyLanguage();
load();
</script>

<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">

    <div class="modal-icon">🗑️</div>

    <div class="modal-title" id="modalTitle">Xác nhận xóa</div>

    <p class="modal-text" id="modalText">
      Bạn có chắc muốn xóa yêu cầu này?
    </p>

    <div class="modal-actions">
      <button class="modal-btn modal-cancel" id="modalCancelBtn" onclick="closeModal()">
        Hủy
      </button>

      <button class="modal-btn modal-delete" id="modalDeleteBtn" onclick="confirmDelete()">
        Xóa
      </button>
    </div>

  </div>
</div>

</body>
</html>
