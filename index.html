let currentUser=null,authMode='register',selectedIssues=[],selectedFiles=[];const $=id=>document.getElementById(id);function L(){return String(localStorage.getItem('language')||'ja').startsWith('vi')?'vi':'ja'}function T(k){return TEXT[L()][k]||k}function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function ic(id,n){$(id).innerHTML=ICON[n]||''}function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200)}function headers(){const t=localStorage.getItem('userToken');return t?{Authorization:'Bearer '+t}:{}}async function json(r){try{return await r.json()}catch{return {}}}

oryOpenBtn').textContent=T('myHistory');$('clearHistoryBtn').textContent=T('clearHistory');renderServices();renderIssues();renderProfile()}
function setMode(m){authMode=m;$('modeRegister').classList.toggle('active',m!=='login'&&m!=='profile');$('modeLogin').classList.toggle('active',m==='login');$('modeRegister').style.display=m==='profile'?'none':'';$('modeLogin').style.display=m==='profile'?'none':'';document.querySelectorAll('.profile-only').forEach(e=>e.classList.toggle('hidden',m!=='profile'));$('authName').classList.toggle('hidden',m==='login');$('authPinConfirm').classList.toggle('hidden',m==='login'||m==='profile');apply()}function showAuth(){$('app').classList.add('auth');$('authScreen').classList.remove('hidden');$('topbar').classList.add('hidden');$('main').classList.add('hidden');$('bottomNav').classList.add('hidden')}function showApp(tab='home'){$('app').classList.remove('auth');$('authScreen').classList.add('hidden');$('topbar').classList.remove('hidden');$('main').classList.remove('hidden');$('bottomNav').classList.remove('hidden');showTab(tab)}function ready(){return currentUser&&currentUser.status==='active'&&currentUser.profileCompleted&&localStorage.getItem('userToken')}function saveUser(token,u){if(token)localStorage.setItem('userToken',token);currentUser=u||currentUser;localStorage.setItem('userProfile',JSON.stringify(currentUser||{}))}async function refresh(){const t=localStorage.getItem('userToken');if(!t)return false;try{const r=await fetch(API+'/user/me',{headers:headers()});if(!r.ok)return false;saveUser(t,await r.json());return true}catch{return false}}
async function init(){Object.entries({tabHome:'home',tabAccount:'user',tabSend:'send',tabSettings:'settings',serviceIcon:'tool',profileIcon:'user',sendIcon:'send',sendBtnIcon:'send',settingsIcon:'settings',authSubmitIcon:'user'}).forEach(([a,b])=>ic(a,b));$('authLang').onchange=e=>setLang(e.target.value);$('language').onchange=e=>setLang(e.target.value);$('modeRegister').onclick=()=>setMode('register');$('modeLogin').onclick=()=>setMode('login');$('authSubmit').onclick=submitAuth;$('logoutBtn').onclick=logout;$('profileLogoutBtn').onclick=logout;$('profileRequestBtn').onclick=()=>showTab('send');$('profileHistoryBtn').onclick=()=>showTab('settings');$('tabHome').onclick=()=>showTab('home');$('tabAccount').onclick=()=>showTab('account');$('tabSend').onclick=()=>showTab('send');$('tabSettings').onclick=()=>showTab('settings');$('chooseMediaBtn').onclick=()=>$('mediaInput').click();$('mediaInput').onchange=files;$('sendBtn').onclick=send;$('issueSearch').oninput=()=>issueOptions(true);$('issueSearch').onfocus=()=>issueOptions(true);document.addEventListener('click',e=>{if(!e.target.closest('.issue-wrap'))$('issueDropdown').classList.remove('show')});$('historyOpenBtn').onclick=loadHistory;$('clearHistoryBtn').onclick=()=>{localStorage.removeItem('myRequests');history([]);toast(T('clearHistory'))};setMode('register');const ok=await refresh();if(ok&&ready())showApp('home');else{if(currentUser&&!currentUser.profileCompleted)setMode('profile');showAuth()}if('serviceWorker'in navigator)navigator.serviceWorker.register('/service-worker.js').catch(()=>{})}function setLang(v){v=String(v).startsWith('vi')?'vi':'ja';localStorage.setItem('language',v);localStorage.setItem('lang',v);apply()}async function submitAuth(){const phone=$('authPhone').value.trim(),pin=$('authPin').value.trim();if(authMode!=='profile'&&(!phone||!pin))return toast(T('required'));$('authSubmit').disabled=true;try{if(authMode==='profile'){const body={name:$('authName').value.trim(),email:$('authEmail').value.trim(),province:$('authProvince').value.trim(),projectName:$('authProject').value.trim(),company:$('authCompany').value.trim()};if(!body.name||!body.email||!body.province||!body.projectName)return toast(T('required'));const r=await fetch(API+'/user/profile',{method:'PUT',headers:{'Content-Type':'application/json',...headers()},body:JSON.stringify(body)});const d=await json(r);if(!r.ok)throw Error(d.message||T('loginFail'));saveUser(null,d.user||d);toast(T('pending'));showAuth();return}const body={phone,pin};if(authMode==='register'){if(pin!==$('authPinConfirm').value.trim())return toast(T('required'));body.name=$('authName').value.trim()}const r=await fetch(API+(authMode==='login'?'/user/login':'/user/register'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await json(r);if(!r.ok)throw Error(d.message||T('loginFail'));saveUser(d.token,d.user);if(d.user&&!d.user.profileCompleted){setMode('profile');showAuth();return}if(d.user&&d.user.status!=='active'){toast(T('pending'));showAuth();return}showApp('home')}catch(e){toast(e.message||T('loginFail'))}finally{$('authSubmit').disabled=false;apply()}}function logout(){localStorage.removeItem('userToken');localStorage.removeItem('userProfile');currentUser=null;setMode('login');showAuth()}
function renderServices(){$('servicesList').innerHTML=[['service1','service1Text'],['service2','service2Text'],['service3','service3Text']].map(x=>'<div class="service"><b>'+esc(T(x[0]))+'</b><p>'+esc(T(x[1]))+'</p></div>').join('')}function renderProfile(){if(!currentUser)return;$('profileName').textContent=currentUser.name||currentUser.phone||'-';$('profileStatus').textContent=currentUser.status==='active'?T('active'):T('waiting');$('profileGrid').innerHTML=[[T('phone'),currentUser.phone],[T('email'),currentUser.email],[T('province'),currentUser.province],[T('project'),currentUser.projectName],[T('company'),currentUser.company]].map(x=>'<div class="profile-line"><span>'+esc(x[0])+'</span><b>'+esc(x[1]||'-')+'</b></div>').join('')}function showTab(tab){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));$(({home:'homeSection',account:'accountSection',send:'sendSection',settings:'settingsSection'})[tab]).classList.add('active');document.querySelectorAll('.bottom button').forEach(b=>b.classList.remove('active'));$(({home:'tabHome',account:'tabAccount',send:'tabSend',settings:'tabSettings'})[tab]).classList.add('active');if(tab==='send')prefill();if(tab==='settings')loadHistory()}function prefill(){if(!currentUser)return;$('name').value=currentUser.name||'';$('phone').value=currentUser.phone||'';$('contact').value=currentUser.email||'';$('address').value=currentUser.address||currentUser.province||''}
function issues(){return ISSUES[L()]||ISSUES.ja}function renderIssues(){selectedIssues=selectedIssues.filter(x=>issues().includes(x));$('selectedIssues').innerHTML=selectedIssues.map((x,i)=>'<span class="tag">'+esc(x)+'<button onclick="removeIssue('+i+')">×</button></span>').join('');issueOptions(false)}function issueOptions(show){const kw=$('issueSearch').value.toLowerCase();const arr=issues().filter(x=>!selectedIssues.includes(x)&&x.toLowerCase().includes(kw));$('issueDropdown').innerHTML=arr.map(x=>'<button data-issue="'+esc(x)+'">'+esc(x)+'</button>').join('')||'<button>-</button>';$('issueDropdown').querySelectorAll('button[data-issue]').forEach(b=>b.onclick=()=>selectIssue(b.dataset.issue));$('issueDropdown').classList.toggle('show',show)}window.selectIssue=x=>{selectedIssues.push(x);$('issueSearch').value='';renderIssues()};window.removeIssue=i=>{selectedIssues.splice(i,1);renderIssues()};function files(){selectedFiles=selectedFiles.concat([...$('mediaInput').files]).slice(0,12);$('mediaInput').value='';renderFiles()}function renderFiles(){if(!selectedFiles.length){$('mediaPreview').innerHTML='';apply();return}$('mediaPreview').innerHTML='<div class="preview">'+selectedFiles.map((f,i)=>{const u=URL.createObjectURL(f);const m=f.type.startsWith('video/')?'<video src="'+u+'" muted playsinline></video>':'<img src="'+u+'">';return '<div>'+m+'<button onclick="removeFile('+i+')">×</button></div>'}).join('')+'</div>';$('uploadText').textContent=selectedFiles.length+'/12 file';$('uploadSub').textContent=selectedFiles.map(f=>f.name).join(', ')}window.removeFile=i=>{selectedFiles.splice(i,1);renderFiles()};
async function send(){if(!ready())return showAuth();if(!selectedIssues.length)return toast(T('issueRequired'));const name=$('name').value.trim(),phone=$('phone').value.trim(),address=$('address').value.trim(),content=$('content').value.trim();if(!name||!phone||!address||!content)return toast(T('required'));$('sendBtn').disabled=true;$('sendBtnText').textContent=T('sending');try{const fd=new FormData();[['name',name],['phone',phone],['contact',$('contact').value.trim()],['address',address],['content',content],['issueTags',JSON.stringify(selectedIssues)],['quoteRequested',$('quoteRequested').checked?'true':'false']].forEach(x=>fd.append(x[0],x[1]));selectedFiles.forEach(f=>fd.append('image',f));const r=await fetch(API+'/request',{method:'POST',headers:headers(),body:fd});const d=await json(r);if(!r.ok)throw Error(d.message||T('fail'));const id=d?.data?.id||d?.id;saveReq(id);$('result').innerHTML='<div class="history-card"><b>'+esc(T('success'))+'</b><br>ID: #'+esc(id||'')+'</div>';selectedIssues=[];selectedFiles=[];$('content').value='';renderIssues();renderFiles();toast(T('success'))}catch(e){$('result').textContent=e.message||T('fail');toast(T('fail'))}finally{$('sendBtn').disabled=false;$('sendBtnText').textContent=T('send')}}function saveReq(id){if(!id)return;const a=JSON.parse(localStorage.getItem('myRequests')||'[]');if(!a.includes(String(id)))a.unshift(String(id));localStorage.setItem('myRequests',JSON.stringify(a.slice(0,50)))}async function loadHistory(){try{const r=await fetch(API+'/user/requests',{headers:headers()});const d=await json(r);history(Array.isArray(d)?d:[])}catch{history([])}}function history(items=[]){$('historyList').innerHTML=items.length?items.map(r=>'<div class="history-card"><b>#'+esc(r.id||r.requestId||'')+'</b> <span class="badge">'+esc(r.status||'untreated')+'</span><div class="steps">'+[0,1,2,3,4,5].map(()=>'<span class="step done"></span>').join('')+'</div><div><b>'+esc(T('freeDesc'))+':</b> '+esc(r.content||'-')+'</div><div><b>'+esc(T('assignee'))+':</b> '+esc(r.assigneeName||T('noAssignee'))+'</div><div><b>'+esc(T('adminReply'))+':</b> '+esc(r.adminReply||T('noReply'))+'</div></div>').join(''):'<div class="card">'+esc(T('noHistory'))+'</div>'}init();
</script></body></html>
