<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gửi yêu cầu sửa điện</title>
</head>
<body>

<h2>Gửi yêu cầu sửa điện</h2>

<input id="name" placeholder="Tên khách"><br><br>
<textarea id="content" placeholder="Mô tả sự cố"></textarea><br><br>
<input type="file" id="image" accept="image/*"><br><br>

<button onclick="sendRequest()">Gửi</button>

<p id="result"></p>

<script>
async function sendRequest() {
  const name = document.getElementById("name").value;
  const content = document.getElementById("content").value;
  const file = document.getElementById("image").files[0];

  let imageBase64 = "";

  if (file) {
    imageBase64 = await toBase64(file);
  }

  await sendToServer(name, content, imageBase64);
}

async function sendToServer(name, content, image) {
  try {
    document.getElementById("result").innerText = "Đang gửi...";

    const res = await fetch("https://yamaden.onrender.com/request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, content, image })
    });

    console.log("status:", res.status);

    const data = await res.json();
    console.log("data:", data);

    if (res.ok) {
      document.getElementById("result").innerText = "Đã gửi thành công!";
    } else {
      document.getElementById("result").innerText = "Gửi thất bại: " + data.message;
    }

  } catch (err) {
    console.log("LỖI GỬI:", err);
    document.getElementById("result").innerText = "Gửi thất bại!";
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
    reader.readAsDataURL(file);
  });
}
</script>

</body>
</html>
