<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YAMADEN Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#111111">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: #f4f4f4;
      padding-bottom: 90px;
    }

    .top-header {
      background: #111;
      color: white;
      padding: 18px;
      border-radius: 0 0 28px 28px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.25);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 21px;
      font-weight: 800;
    }

    .logo-box img {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: white;
    }

    .lang-select {
      width: 78px;
      padding: 8px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
    }

    .hero {
      margin-top: 18px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 22px;
      padding: 18px;
    }

    .hero h2 {
      margin: 0 0 8px;
      font-size: 23px;
    }

    .hero p {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: #e5e5e5;
    }

    .container { padding: 18px; }

    .notice {
      display: none;
      background: #eeeeee;
      color: #111;
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 14px;
      font-weight: 700;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
      margin-bottom: 18px;
      border: 1px solid #ddd;
    }

    .card h3 {
      margin: 0 0 18px;
      color: #111;
      font-size: 22px;
    }

    .field { margin-bottom: 15px; }

    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 7px;
      font-size: 14px;
      color: #333;
    }

    input, textarea {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 15px;
      padding: 15px;
      font-size: 16px;
      outline: none;
      background: white;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: #111;
      box-shadow: 0 0 0 4px rgba(0,0,0,0.08);
    }

    .upload-box {
      border: 2px dashed #999;
      background: #fafafa;
      padding: 18px;
      border-radius: 18px;
      text-align: center;
      color: #111;
      font-weight: 700;
    }

    .upload-box input {
      border: none;
      padding: 10px 0 0;
      background: transparent;
    }

    .main-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      background: #111;
      color: white;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
    }

    .copy-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px;
      background: #444;
      color: white;
      font-size: 15px;
      font-weight: 800;
      margin-top: 10px;
    }

    .success-box {
      background: #f1f1f1;
      color: #111;
      padding: 16px;
      border-radius: 18px;
      line-height: 1.8;
      border: 1px solid #ddd;
    }

    .result {
      margin-top: 14px;
      font-weight: 700;
      color: #111;
      line-height: 1.7;
    }

    .loader {
      border: 4px solid #ddd;
      border-top: 4px solid #111;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 18px auto;
      display: none;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .hidden { display: none; }

    .badge {
      display: inline-block;
      padding: 7px 13px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }

    .pending { background: #ddd; color: #111; }
    .processing { background: #777; color: white; }
    .completed { background: #111; color: white; }

    .check-image {
      width: 100%;
      max-width: 320px;
      border-radius: 16px;
      margin-top: 8px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.14);
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(440px, calc(100% - 28px));
      background: white;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      display: flex;
      padding: 8px;
      gap: 8px;
      z-index: 100;
      border: 1px solid #ddd;
    }

    .bottom-nav button {
      flex: 1;
      border: none;
      background: transparent;
      color: #666;
      border-radius: 16px;
      padding: 11px 8px;
      font-weight: 800;
      font-size: 14px;
    }

    .bottom-nav button.active {
      background: #111;
      color: white;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 14px 0;
    }

    .info-line { margin: 7px 0; }
  </style>
</head>

<body>

<div class="app">

  <div class="top-header">
    <div class="top-row">
      <div class="logo-box">
        <img src="/icon-192.png" alt="YAMADEN">
        <span>YAMADEN</span>
      </div>

      <select id="language" class="lang-select" onchange="changeLanguage()">
        <option value="vi">VI</option>
        <option value="ja">JP</option>
      </select>
    </div>

    <div class="hero">
      <h2 id="welcomeTitle">Xin chào!</h2>
      <p id="welcomeText">Gửi yêu cầu hỗ trợ và tra cứu trạng thái nhanh chóng.</p>
    </div>
  </div>

  <div class="container">

    <div id="notice" class="notice">🔔 Admin đã phản hồi!</div>

    <div class="card" id="sendSection">
      <h3 id="sendTitle">Gửi yêu cầu sửa điện</h3>

      <div class="field">
        <label id="labelName">Tên khách</label>
        <input id="name" placeholder="Tên khách">
      </div>

      <div class="field">
        <label id="labelPhone">Số điện thoại</label>
        <input id="phone" placeholder="Số điện thoại">
      </div>

      <div class="field">
        <label id="labelContact">Liên hệ</label>
        <input id="contact" placeholder="Email / LINE / Zalo">
      </div>

      <div class="field">
        <label id="labelAddress">Địa chỉ công trình</label>
        <input id="address" placeholder="Địa chỉ công trình">
      </div>

      <div class="field">
        <label id="labelContent">Nội dung sự cố</label>
        <textarea id="content" placeholder="Mô tả sự cố"></textarea>
      </div>

      <div class="field">
        <label id="labelImage">Hình ảnh</label>
        <div class="upload-box">
          📷 Chọn ảnh hoặc chụp ảnh
          <input type="file" id="image" accept="image/*">
        </div>
      </div>

      <button class="main-btn" onclick="sendRequest()" id="sendBtn">Gửi yêu cầu</button>

      <div class="loader" id="loader"></div>
      <div id="result" class="result"></div>
    </div>

    <div class="card hidden" id="checkSection">
      <h3 id="checkTitle">Tra cứu trạng thái yêu cầu</h3>

      <div class="field">
        <label id="labelCheckId">Mã yêu cầu</label>
        <input id="checkId" placeholder="Nhập mã yêu cầu">
      </div>

      <button class="main-btn" onclick="checkStatus(false)" id="checkBtn">Kiểm tra</button>

      <div id="checkResult" class="result"></div>
    </div>

  </div>

  <div class="bottom-nav">
    <button id="tabSend" class="active" onclick="showTab('send')">Gửi yêu cầu</button>
    <button id="tabCheck" onclick="showTab('check')">Tra cứu</button>
  </div>

</div>

<script>
const API = "https://yamaden.onrender.com";

let lastAdminReply = "";
let lastCheckedId = "";

const texts = {
  vi: {
    welcomeTitle: "Xin chào!",
    welcomeText: "Gửi yêu cầu hỗ trợ và tra cứu trạng thái nhanh chóng.",
    tabSend: "Gửi yêu cầu",
    tabCheck: "Tra cứu",
    sendTitle: "Gửi yêu cầu sửa điện",
    checkTitle: "Tra cứu trạng thái yêu cầu",
    name: "Tên khách",
    phone: "Số điện thoại",
    contact: "Liên hệ",
    address: "Địa chỉ công trình",
    content: "Nội dung sự cố",
    image: "Hình ảnh",
    send: "Gửi yêu cầu",
    check: "Kiểm tra",
    checkPlaceholder: "Nhập mã yêu cầu",
    sending: "Đang gửi...",
    success: "Đã gửi thành công!",
    fail: "Gửi thất bại!",
    required: "Vui lòng nhập đầy đủ thông tin!",
    requestId: "Mã yêu cầu",
    copy: "📋 Copy ID",
    copied: "Đã copy ID!",
    notFound: "Không tìm thấy yêu cầu!",
    status: "Trạng thái",
    pending: "Đã tiếp nhận",
    processing: "Đang xử lý",
    completed: "Hoàn thành",
    adminReply: "Phản hồi admin",
    noReply: "Chưa có phản hồi",
    noImage: "Không có hình",
    newReply: "🔔 Admin đã phản hồi!"
  },
  ja: {
    welcomeTitle: "こんにちは！",
    welcomeText: "依頼の送信と状況確認ができます。",
    tabSend: "依頼送信",
    tabCheck: "確認",
    sendTitle: "修理依頼送信",
    checkTitle: "依頼状況確認",
    name: "名前",
    phone: "電話番号",
    contact: "連絡先",
    address: "住所",
    content: "内容",
    image: "画像",
    send: "送信",
    check: "確認",
    checkPlaceholder: "受付IDを入力",
    sending: "送信中...",
    success: "送信完了！",
    fail: "送信失敗！",
    required: "必須項目を入力してください",
    requestId: "受付ID",
    copy: "📋 IDをコピー",
    copied: "IDをコピーしました！",
    notFound: "見つかりませんでした",
    status: "状態",
    pending: "受付済み",
    processing: "処理中",
    completed: "完了",
    adminReply: "管理者コメント",
    noReply: "まだ返信はありません",
    noImage: "画像なし",
    newReply: "🔔 管理者から返信がありました！"
  }
};

let lang = localStorage.getItem("lang") || "vi";

function applyLang() {
  const t = texts[lang];

  language.value = lang;
  welcomeTitle.innerText = t.welcomeTitle;
  welcomeText.innerText = t.welcomeText;

  tabSend.innerText = t.tabSend;
  tabCheck.innerText = t.tabCheck;

  sendTitle.innerText = t.sendTitle;
  checkTitle.innerText = t.checkTitle;

  labelName.innerText = t.name;
  labelPhone.innerText = t.phone;
  labelContact.innerText = t.contact;
  labelAddress.innerText = t.address;
  labelContent.innerText = t.content;
  labelImage.innerText = t.image;
  labelCheckId.innerText = t.requestId;

  nameEl.placeholder = t.name;
  phoneEl.placeholder = t.phone;
  contactEl.placeholder = t.contact;
  addressEl.placeholder = t.address;
  contentEl.placeholder = t.content;

  sendBtn.innerText = t.send;
  checkBtn.innerText = t.check;
  checkId.placeholder = t.checkPlaceholder;
  notice.innerText = t.newReply;
}

function changeLanguage() {
  lang = language.value;
  localStorage.setItem("lang", lang);
  applyLang();
}

function showTab(tab) {
  if (tab === "send") {
    sendSection.classList.remove("hidden");
    checkSection.classList.add("hidden");
    tabSend.classList.add("active");
    tabCheck.classList.remove("active");
  } else {
    sendSection.classList.add("hidden");
    checkSection.classList.remove("hidden");
    tabSend.classList.remove("active");
    tabCheck.classList.add("active");
  }
}

function showNotice() {
  notice.innerText = texts[lang].newReply;
  notice.style.display = "block";

  setTimeout(() => {
    notice.style.display = "none";
  }, 5000);

  try {
    const audio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=");
    audio.play();
  } catch (e) {}
}

async function sendRequest() {
  const t = texts[lang];

  const name = nameEl.value;
  const phone = phoneEl.value;
  const contact = contactEl.value;
  const address = addressEl.value;
  const content = contentEl.value;
  const file = imageEl.files[0];

  if (!name || !phone || !address || !content) {
    result.innerText = t.required;
    return;
  }

  loader.style.display = "block";
  result.innerText = t.sending;

  let image = "";

  if (file) {
    image = await resizeImage(file, 800, 0.6);
  }

  try {
    const res = await fetch(API + "/request", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ name, phone, contact, address, content, image })
    });

    const data = await res.json();

    if (res.ok) {
      const id = data.data.id;

      result.innerHTML = `
        <div class="success-box">
          <div><b>${t.success}</b></div>
          <div>${t.requestId}: <b id="reqId">${id}</b></div>
          <button class="copy-btn" onclick="copyId()">${t.copy}</button>
          <button class="main-btn" onclick="openCheck('${id}')">🔍 ${t.tabCheck}</button>
        </div>
      `;

      nameEl.value = "";
      phoneEl.value = "";
      contactEl.value = "";
      addressEl.value = "";
      contentEl.value = "";
      imageEl.value = "";
    } else {
      result.innerText = t.fail;
    }

  } catch (err) {
    console.log(err);
    result.innerText = t.fail;
  }

  loader.style.display = "none";
}

function copyId() {
  const t = texts[lang];
  const id = document.getElementById("reqId").innerText;

  navigator.clipboard.writeText(id).then(() => {
    alert(t.copied);
  });
}

function openCheck(id) {
  showTab("check");
  checkId.value = id;
  lastAdminReply = "";
  lastCheckedId = id;
  checkStatus(false);
}

async function checkStatus(isAuto = false) {
  const t = texts[lang];
  const id = checkId.value;

  if (!id) return;

  if (!isAuto) {
    checkResult.innerText = "Loading...";
  }

  const res = await fetch(API + "/request/" + id);

  if (!res.ok) {
    if (!isAuto) {
      checkResult.innerText = t.notFound;
    }
    return;
  }

  const data = await res.json();

  if (lastCheckedId !== id) {
    lastAdminReply = data.adminReply || "";
    lastCheckedId = id;
  } else {
    if (isAuto && lastAdminReply && data.adminReply && data.adminReply !== lastAdminReply) {
      showNotice();
    }
    lastAdminReply = data.adminReply || "";
  }

  let statusText = "";
  let badgeClass = "pending";

  if (data.status === "pending") {
    statusText = t.pending;
    badgeClass = "pending";
  }

  if (data.status === "processing") {
    statusText = t.processing;
    badgeClass = "processing";
  }

  if (data.status === "completed") {
    statusText = t.completed;
    badgeClass = "completed";
  }

  checkResult.innerHTML = `
    <div class="success-box">
      <div><b>${t.requestId}:</b> ${data.id}</div>

      <div style="margin-top:8px;">
        <b>${t.status}:</b>
        <span class="badge ${badgeClass}">${statusText}</span>
      </div>

      <hr>

      <div class="info-line"><b>${t.name}:</b> ${data.name || ""}</div>
      <div class="info-line"><b>${t.phone}:</b> ${data.phone || ""}</div>
      <div class="info-line"><b>${t.contact}:</b> ${data.contact || ""}</div>
      <div class="info-line"><b>${t.address}:</b> ${data.address || ""}</div>

      <div style="margin-top:8px;">
        <b>${t.content}:</b><br>
        ${data.content || ""}
      </div>

      <div style="margin-top:10px;">
        <b>${t.image}:</b><br>
        ${
          data.image
          ? `<img src="${data.image}" class="check-image">`
          : t.noImage
        }
      </div>

      <hr>

      <div>
        <b>${t.adminReply}:</b><br>
        ${data.adminReply ? data.adminReply : t.noReply}
      </div>
    </div>
  `;
}

function resizeImage(file, maxWidth, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();

    reader.onload = e => {
      const img = new Image();

      img.onload = () => {
        const canvas = document.createElement("canvas");

        let w = img.width;
        let h = img.height;

        if (w > maxWidth) {
          h = h * maxWidth / w;
          w = maxWidth;
        }

        canvas.width = w;
        canvas.height = h;

        canvas.getContext("2d").drawImage(img, 0, 0, w, h);

        resolve(canvas.toDataURL("image/jpeg", quality));
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

const sendSection = document.getElementById("sendSection");
const checkSection = document.getElementById("checkSection");
const tabSend = document.getElementById("tabSend");
const tabCheck = document.getElementById("tabCheck");

const nameEl = document.getElementById("name");
const phoneEl = document.getElementById("phone");
const contactEl = document.getElementById("contact");
const addressEl = document.getElementById("address");
const contentEl = document.getElementById("content");
const imageEl = document.getElementById("image");

const result = document.getElementById("result");
const loader = document.getElementById("loader");

const checkId = document.getElementById("checkId");
const checkResult = document.getElementById("checkResult");
const notice = document.getElementById("notice");

applyLang();

setInterval(() => {
  if (!checkSection.classList.contains("hidden") && checkId.value) {
    checkStatus(true);
  }
}, 5000);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}
</script>

</body>
</html>
