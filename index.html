<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YAMADEN Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b3d91">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #222;
    }

    .header {
      background: linear-gradient(135deg, #0b3d91, #1f8dd6);
      color: white;
      padding: 25px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 720px;
      margin: 20px auto;
      padding: 15px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .tabs button {
      flex: 1;
      background: #dbe8ff;
      color: #0b3d91;
    }

    .tabs button.active {
      background: #0b3d91;
      color: white;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 15px;
    }

    textarea {
      min-height: 120px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #0b3d91;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }

    button:active {
      transform: scale(0.96);
    }

    .result {
      margin-top: 12px;
      font-weight: bold;
      color: #0b3d91;
      line-height: 1.7;
    }

    .success-box {
      background: #e8f2ff;
      padding: 15px;
      border-radius: 12px;
      color: #0b3d91;
      line-height: 1.8;
    }

    .copy-btn {
      background: #1f8dd6;
    }

    .loader {
      border: 4px solid #ccc;
      border-top: 4px solid #0b3d91;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      animation: spin 1s linear infinite;
      margin: 15px auto;
      display: none;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .lang {
      text-align: right;
      margin-bottom: 10px;
    }

    .status-pending {
      color: gray;
    }

    .status-processing {
      color: orange;
    }

    .status-completed {
      color: green;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="header">YAMADEN Support</div>

<div class="container">

  <div class="lang">
    <select id="language" onchange="changeLanguage()">
      <option value="vi">Tiếng Việt</option>
      <option value="ja">日本語</option>
    </select>
  </div>

  <div class="tabs">
    <button id="tabSend" class="active" onclick="showTab('send')">Gửi yêu cầu</button>
    <button id="tabCheck" onclick="showTab('check')">Tra cứu</button>
  </div>

  <div class="card" id="sendSection">
    <h3 id="sendTitle">Gửi yêu cầu sửa điện</h3>

    <input id="name" placeholder="Tên khách">
    <input id="phone" placeholder="Số điện thoại">
    <input id="contact" placeholder="Email / LINE / Zalo">
    <input id="address" placeholder="Địa chỉ công trình">

    <textarea id="content" placeholder="Mô tả sự cố"></textarea>

    <input type="file" id="image" accept="image/*">

    <button onclick="sendRequest()" id="sendBtn">Gửi</button>

    <div class="loader" id="loader"></div>

    <p id="result" class="result"></p>
  </div>

  <div class="card hidden" id="checkSection">
    <h3 id="checkTitle">Tra cứu trạng thái yêu cầu</h3>

    <input id="checkId" placeholder="Nhập mã yêu cầu">

    <button onclick="checkStatus()" id="checkBtn">Kiểm tra</button>

    <p id="checkResult" class="result"></p>
  </div>

</div>

<script>
const API = "https://yamaden.onrender.com";

const texts = {
  vi: {
    tabSend: "Gửi yêu cầu",
    tabCheck: "Tra cứu",
    sendTitle: "Gửi yêu cầu sửa điện",
    checkTitle: "Tra cứu trạng thái yêu cầu",
    name: "Tên khách",
    phone: "Số điện thoại",
    contact: "Email / LINE / Zalo",
    address: "Địa chỉ công trình",
    content: "Mô tả sự cố",
    send: "Gửi",
    check: "Kiểm tra",
    checkPlaceholder: "Nhập mã yêu cầu",
    sending: "Đang gửi...",
    success: "Đã gửi thành công!",
    fail: "Gửi thất bại!",
    required: "Vui lòng nhập đầy đủ thông tin!",
    requestId: "Mã yêu cầu",
    copy: "📋 Copy ID",
    copied: "Đã copy ID!",
    notFound: "Không tìm thấy yêu cầu!",
    status: "Trạng thái",
    pending: "Đã tiếp nhận",
    processing: "Đang xử lý",
    completed: "Hoàn thành",
    adminReply: "Phản hồi admin",
    noReply: "Chưa có phản hồi"
  },
  ja: {
    tabSend: "依頼送信",
    tabCheck: "確認",
    sendTitle: "修理依頼送信",
    checkTitle: "依頼状況確認",
    name: "名前",
    phone: "電話番号",
    contact: "連絡先",
    address: "住所",
    content: "内容",
    send: "送信",
    check: "確認",
    checkPlaceholder: "受付IDを入力",
    sending: "送信中...",
    success: "送信完了！",
    fail: "送信失敗！",
    required: "必須項目を入力してください",
    requestId: "受付ID",
    copy: "📋 IDをコピー",
    copied: "IDをコピーしました！",
    notFound: "見つかりませんでした",
    status: "状態",
    pending: "受付済み",
    processing: "処理中",
    completed: "完了",
    adminReply: "管理者コメント",
    noReply: "まだ返信はありません"
  }
};

let lang = localStorage.getItem("lang") || "vi";

function applyLang() {
  const t = texts[lang];

  document.getElementById("language").value = lang;

  document.getElementById("tabSend").innerText = t.tabSend;
  document.getElementById("tabCheck").innerText = t.tabCheck;

  document.getElementById("sendTitle").innerText = t.sendTitle;
  document.getElementById("checkTitle").innerText = t.checkTitle;

  document.getElementById("name").placeholder = t.name;
  document.getElementById("phone").placeholder = t.phone;
  document.getElementById("contact").placeholder = t.contact;
  document.getElementById("address").placeholder = t.address;
  document.getElementById("content").placeholder = t.content;

  document.getElementById("sendBtn").innerText = t.send;
  document.getElementById("checkBtn").innerText = t.check;
  document.getElementById("checkId").placeholder = t.checkPlaceholder;
}

function changeLanguage() {
  lang = document.getElementById("language").value;
  localStorage.setItem("lang", lang);
  applyLang();
}

function showTab(tab) {
  if (tab === "send") {
    sendSection.classList.remove("hidden");
    checkSection.classList.add("hidden");
    tabSend.classList.add("active");
    tabCheck.classList.remove("active");
  } else {
    sendSection.classList.add("hidden");
    checkSection.classList.remove("hidden");
    tabSend.classList.remove("active");
    tabCheck.classList.add("active");
  }
}

async function sendRequest() {
  const t = texts[lang];

  const name = nameEl.value;
  const phone = phoneEl.value;
  const contact = contactEl.value;
  const address = addressEl.value;
  const content = contentEl.value;
  const file = imageEl.files[0];

  if (!name || !phone || !address || !content) {
    result.innerText = t.required;
    return;
  }

  loader.style.display = "block";
  result.innerText = t.sending;

  let image = "";

  if (file) {
    image = await resizeImage(file, 800, 0.6);
  }

  try {
    const res = await fetch(API + "/request", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ name, phone, contact, address, content, image })
    });

    const data = await res.json();

    if (res.ok) {
      const id = data.data.id;

      result.innerHTML = `
        <div class="success-box">
          <div><b>${t.success}</b></div>
          <div>${t.requestId}: <b id="reqId">${id}</b></div>
          <button class="copy-btn" onclick="copyId()">${t.copy}</button>
          <button onclick="openCheck('${id}')">🔍 ${t.tabCheck}</button>
        </div>
      `;

      nameEl.value = "";
      phoneEl.value = "";
      contactEl.value = "";
      addressEl.value = "";
      contentEl.value = "";
      imageEl.value = "";
    } else {
      result.innerText = t.fail;
    }

  } catch (err) {
    console.log(err);
    result.innerText = t.fail;
  }

  loader.style.display = "none";
}

function copyId() {
  const t = texts[lang];
  const id = document.getElementById("reqId").innerText;

  navigator.clipboard.writeText(id).then(() => {
    alert(t.copied);
  });
}

function openCheck(id) {
  showTab("check");
  checkId.value = id;
  checkStatus();
}

async function checkStatus() {
  const t = texts[lang];
  const id = checkId.value;

  if (!id) return;

  checkResult.innerText = "Loading...";

  const res = await fetch(API + "/request/" + id);

  if (!res.ok) {
    checkResult.innerText = t.notFound;
    return;
  }

  const data = await res.json();

  let statusText = "";
  let cls = "";

  if (data.status === "pending") {
    statusText = t.pending;
    cls = "status-pending";
  }

  if (data.status === "processing") {
    statusText = t.processing;
    cls = "status-processing";
  }

  if (data.status === "completed") {
    statusText = t.completed;
    cls = "status-completed";
  }

  checkResult.innerHTML = `
    <div class="success-box">
      <div>${t.requestId}: <b>${data.id}</b></div>
      <div>${t.status}: <b class="${cls}">${statusText}</b></div>

      <div style="margin-top:12px;">
        <b>${t.adminReply}:</b><br>
        ${data.adminReply ? data.adminReply : t.noReply}
      </div>
    </div>
  `;
}

function resizeImage(file, maxWidth, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();

    reader.onload = e => {
      const img = new Image();

      img.onload = () => {
        const canvas = document.createElement("canvas");

        let w = img.width;
        let h = img.height;

        if (w > maxWidth) {
          h = h * maxWidth / w;
          w = maxWidth;
        }

        canvas.width = w;
        canvas.height = h;

        canvas.getContext("2d").drawImage(img, 0, 0, w, h);

        resolve(canvas.toDataURL("image/jpeg", quality));
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

const sendSection = document.getElementById("sendSection");
const checkSection = document.getElementById("checkSection");
const tabSend = document.getElementById("tabSend");
const tabCheck = document.getElementById("tabCheck");

const nameEl = document.getElementById("name");
const phoneEl = document.getElementById("phone");
const contactEl = document.getElementById("contact");
const addressEl = document.getElementById("address");
const contentEl = document.getElementById("content");
const imageEl = document.getElementById("image");

const result = document.getElementById("result");
const loader = document.getElementById("loader");

const checkId = document.getElementById("checkId");
const checkResult = document.getElementById("checkResult");

applyLang();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}
</script>

</body>
</html>
