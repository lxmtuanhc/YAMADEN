<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gửi yêu cầu sửa điện</title>
</head>
<body>

<h2>Gửi yêu cầu sửa điện</h2>

<input id="name" placeholder="Tên khách"><br><br>
<textarea id="content" placeholder="Mô tả sự cố"></textarea><br><br>
<input type="file" id="image" accept="image/*"><br><br>

<button onclick="sendRequest()">Gửi</button>

<p id="result"></p>

<script>
async function sendRequest() {
  const name = document.getElementById("name").value;
  const content = document.getElementById("content").value;
  const file = document.getElementById("image").files[0];

  document.getElementById("result").innerText = "Đang gửi...";

  let imageBase64 = "";

  if (file) {
    imageBase64 = await resizeImage(file, 800, 0.6);
  }

  try {
    const res = await fetch("https://yamaden.onrender.com/request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, content, image: imageBase64 })
    });

    const data = await res.json();

    if (res.ok) {
      document.getElementById("result").innerText = "Đã gửi thành công!";
    } else {
      document.getElementById("result").innerText = "Gửi thất bại: " + data.message;
    }
  } catch (err) {
    console.log(err);
    document.getElementById("result").innerText = "Gửi thất bại!";
  }
}

function resizeImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();

    reader.onload = function(e) {
      const img = new Image();

      img.onload = function() {
        const canvas = document.createElement("canvas");

        let width = img.width;
        let height = img.height;

        if (width > maxWidth) {
          height = Math.round(height * maxWidth / width);
          width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);

        const base64 = canvas.toDataURL("image/jpeg", quality);
        resolve(base64);
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}
</script>

</body>
</html>
