<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YAMADEN</title>
</head>
<body>

<select id="language" onchange="changeLanguage()">
  <option value="vi">Tiếng Việt</option>
  <option value="ja">日本語</option>
</select>

<h2 id="title">Gửi yêu cầu sửa điện</h2>

<input id="name" placeholder="Tên khách"><br><br>
<textarea id="content" placeholder="Mô tả sự cố"></textarea><br><br>
<input type="file" id="image" accept="image/*"><br><br>

<button id="sendBtn" onclick="sendRequest()">Gửi</button>

<p id="result"></p>

<script>
const API = "https://yamaden.onrender.com";

const texts = {
  vi: {
    title: "Gửi yêu cầu sửa điện",
    name: "Tên khách",
    content: "Mô tả sự cố",
    send: "Gửi",
    sending: "Đang gửi...",
    success: "Đã gửi thành công!",
    failed: "Gửi thất bại!"
  },
  ja: {
    title: "電気修理依頼を送信",
    name: "お客様名",
    content: "不具合内容",
    send: "送信",
    sending: "送信中...",
    success: "送信が完了しました！",
    failed: "送信に失敗しました！"
  }
};

let currentLang = localStorage.getItem("language") || "vi";

function applyLanguage() {
  const t = texts[currentLang];

  document.getElementById("language").value = currentLang;
  document.getElementById("title").innerText = t.title;
  document.getElementById("name").placeholder = t.name;
  document.getElementById("content").placeholder = t.content;
  document.getElementById("sendBtn").innerText = t.send;
}

function changeLanguage() {
  currentLang = document.getElementById("language").value;
  localStorage.setItem("language", currentLang);
  applyLanguage();
}

async function sendRequest() {
  const t = texts[currentLang];

  const name = document.getElementById("name").value;
  const content = document.getElementById("content").value;
  const file = document.getElementById("image").files[0];

  document.getElementById("result").innerText = t.sending;

  let imageBase64 = "";

  if (file) {
    imageBase64 = await resizeImage(file, 800, 0.6);
  }

  try {
    const res = await fetch(API + "/request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, content, image: imageBase64 })
    });

    const data = await res.json();

    if (res.ok) {
      document.getElementById("result").innerText = t.success;
    } else {
      document.getElementById("result").innerText = t.failed + " " + data.message;
    }
  } catch (err) {
    console.log(err);
    document.getElementById("result").innerText = t.failed;
  }
}

function resizeImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();

    reader.onload = function(e) {
      const img = new Image();

      img.onload = function() {
        const canvas = document.createElement("canvas");

        let width = img.width;
        let height = img.height;

        if (width > maxWidth) {
          height = Math.round(height * maxWidth / width);
          width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);

        const base64 = canvas.toDataURL("image/jpeg", quality);
        resolve(base64);
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

applyLanguage();
</script>

</body>
</html>
