<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YAMADEN Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b3d91">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f6fb;
    }

    .header {
      background: linear-gradient(135deg, #0b3d91, #1f8dd6);
      color: white;
      padding: 25px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 700px;
      margin: 20px auto;
      padding: 15px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #0b3d91;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }

    button:active {
      transform: scale(0.96);
    }

    .result {
      margin-top: 10px;
      font-weight: bold;
      color: #0b3d91;
    }

    .success-box {
      background: #e8f2ff;
      padding: 15px;
      border-radius: 12px;
      color: #0b3d91;
      line-height: 1.7;
    }

    .copy-btn {
      background: #1f8dd6;
    }

    .check-btn {
      background: #0b3d91;
    }

    .loader {
      border: 4px solid #ccc;
      border-top: 4px solid #0b3d91;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      animation: spin 1s linear infinite;
      margin: auto;
      display: none;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .lang {
      text-align: right;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="header">YAMADEN Support</div>

<div class="container">

  <div class="lang">
    <select id="language" onchange="changeLanguage()">
      <option value="vi">Tiếng Việt</option>
      <option value="ja">日本語</option>
    </select>
  </div>

  <div class="card">

    <h3 id="title">Gửi yêu cầu</h3>

    <input id="name" placeholder="Tên khách">
    <input id="phone" placeholder="Số điện thoại">
    <input id="contact" placeholder="Email / LINE / Zalo">
    <input id="address" placeholder="Địa chỉ công trình">

    <textarea id="content" placeholder="Mô tả sự cố"></textarea>

    <input type="file" id="image" accept="image/*">

    <button onclick="sendRequest()" id="sendBtn">Gửi</button>

    <div class="loader" id="loader"></div>

    <p id="result" class="result"></p>

  </div>

</div>

<script>
const API = "https://yamaden.onrender.com";

const texts = {
  vi: {
    title: "Gửi yêu cầu sửa điện",
    name: "Tên khách",
    phone: "Số điện thoại",
    contact: "Email / LINE / Zalo",
    address: "Địa chỉ công trình",
    content: "Mô tả sự cố",
    send: "Gửi",
    sending: "Đang gửi...",
    success: "Đã gửi thành công!",
    fail: "Gửi thất bại!",
    required: "Vui lòng nhập đầy đủ thông tin!",
    requestId: "Mã yêu cầu",
    copy: "📋 Copy ID",
    checkNow: "🔍 Tra cứu ngay",
    copied: "Đã copy ID!"
  },
  ja: {
    title: "修理依頼送信",
    name: "名前",
    phone: "電話番号",
    contact: "連絡先",
    address: "住所",
    content: "内容",
    send: "送信",
    sending: "送信中...",
    success: "送信完了！",
    fail: "送信失敗！",
    required: "必須項目を入力してください",
    requestId: "受付ID",
    copy: "📋 IDをコピー",
    checkNow: "🔍 今すぐ確認",
    copied: "IDをコピーしました！"
  }
};

let lang = localStorage.getItem("lang") || "vi";

function applyLang() {
  const t = texts[lang];

  document.getElementById("language").value = lang;
  document.getElementById("title").innerText = t.title;
  document.getElementById("name").placeholder = t.name;
  document.getElementById("phone").placeholder = t.phone;
  document.getElementById("contact").placeholder = t.contact;
  document.getElementById("address").placeholder = t.address;
  document.getElementById("content").placeholder = t.content;
  document.getElementById("sendBtn").innerText = t.send;
}

function changeLanguage() {
  lang = document.getElementById("language").value;
  localStorage.setItem("lang", lang);
  applyLang();
}

async function sendRequest() {
  const t = texts[lang];

  const name = nameEl.value;
  const phone = phoneEl.value;
  const contact = contactEl.value;
  const address = addressEl.value;
  const content = contentEl.value;
  const file = imageEl.files[0];

  if (!name || !phone || !address || !content) {
    result.innerText = t.required;
    return;
  }

  loader.style.display = "block";
  result.innerText = t.sending;

  let image = "";

  if (file) {
    image = await resizeImage(file, 800, 0.6);
  }

  try {
    const res = await fetch(API + "/request", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({name, phone, contact, address, content, image})
    });

    const data = await res.json();

    if (res.ok) {
      const id = data.data.id;

      result.innerHTML = `
        <div class="success-box">
          <div><b>${t.success}</b></div>
          <div>${t.requestId}: <b id="reqId">${id}</b></div>
          <button class="copy-btn" onclick="copyId()">${t.copy}</button>
          <button class="check-btn" onclick="goCheck('${id}')">${t.checkNow}</button>
        </div>
      `;

      nameEl.value = "";
      phoneEl.value = "";
      contactEl.value = "";
      addressEl.value = "";
      contentEl.value = "";
      imageEl.value = "";

    } else {
      result.innerText = t.fail;
    }

  } catch (err) {
    console.log(err);
    result.innerText = t.fail;
  }

  loader.style.display = "none";
}

function copyId() {
  const t = texts[lang];
  const id = document.getElementById("reqId").innerText;

  navigator.clipboard.writeText(id).then(() => {
    alert(t.copied);
  });
}

function goCheck(id) {
  window.location.href = "check.html?id=" + id;
}

function resizeImage(file, maxWidth, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();

    reader.onload = e => {
      const img = new Image();

      img.onload = () => {
        const canvas = document.createElement("canvas");

        let w = img.width;
        let h = img.height;

        if (w > maxWidth) {
          h = h * maxWidth / w;
          w = maxWidth;
        }

        canvas.width = w;
        canvas.height = h;

        canvas.getContext("2d").drawImage(img, 0, 0, w, h);

        resolve(canvas.toDataURL("image/jpeg", quality));
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

const nameEl = document.getElementById("name");
const phoneEl = document.getElementById("phone");
const contactEl = document.getElementById("contact");
const addressEl = document.getElementById("address");
const contentEl = document.getElementById("content");
const imageEl = document.getElementById("image");
const result = document.getElementById("result");
const loader = document.getElementById("loader");

applyLang();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}
</script>

</body>
</html>
