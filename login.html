<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YAMADEN Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="/icon-admin-192.png">
<link rel="apple-touch-icon" href="/icon-admin-192.png">

<!-- QUAN TRỌNG -->
<link rel="manifest" href="/admin-manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  min-height: 100vh;
  background: #0f172a;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #111827;
}

.login-box {
  width: 380px;
  max-width: calc(100% - 32px);
  background: white;
  border-radius: 24px;
  padding: 30px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.35);
}

.top-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 26px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand img {
  width: 58px;
  height: 58px;
  border-radius: 14px;
  background: white;
}

.brand-title {
  font-size: 26px;
  font-weight: 900;
}

.brand-sub {
  font-size: 13px;
  color: #64748b;
  font-weight: 700;
}

.lang {
  padding: 9px 12px;
  border-radius: 12px;
  border: 1px solid #d1d5db;
  font-weight: 900;
  background: white;
}

.title {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 18px;
}

input {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
  font-size: 16px;
  outline: none;
  margin-bottom: 14px;
}

input:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

button:disabled {
  opacity: 0.65;
  cursor: not-allowed;
}

.error {
  color: #dc2626;
  font-weight: 800;
  margin-top: 12px;
  text-align: center;
}

.note {
  margin-top: 18px;
  font-size: 12px;
  color: #64748b;
  text-align: center;
}
</style>
</head>

<body>

<div class="login-box">

  <div class="top-row">
    <div class="brand">
      <img src="/icon-192.png" alt="YAMADEN">
      <div>
        <div class="brand-title">YAMADEN</div>
        <div class="brand-sub">Admin Dashboard</div>
      </div>
    </div>

    <select id="language" class="lang" onchange="changeLanguage()">
      <option value="vi">VI</option>
      <option value="ja">JP</option>
    </select>
  </div>

  <div class="title" id="loginTitle">🔐 Đăng nhập quản trị</div>

  <input type="password" id="password" placeholder="Nhập mật khẩu" onkeydown="handleEnter(event)">

  <button id="loginBtn" onclick="login()">Đăng nhập</button>

  <div id="error" class="error"></div>

  <div class="note">Customer Request System</div>
</div>

<script>
const API = "https://yamaden.onrender.com";

let lang = localStorage.getItem("loginLang") || localStorage.getItem("language") || "vi";

const texts = {
  vi: {
    title: "🔐 Đăng nhập quản trị",
    placeholder: "Nhập mật khẩu",
    login: "Đăng nhập",
    logging: "Đang đăng nhập...",
    wrong: "Sai mật khẩu hoặc lỗi đăng nhập!"
  },
  ja: {
    title: "🔐 管理者ログイン",
    placeholder: "パスワードを入力",
    login: "ログイン",
    logging: "ログイン中...",
    wrong: "パスワードが違うか、ログインに失敗しました"
  }
};

function applyLanguage() {
  const t = texts[lang];

  language.value = lang;
  loginTitle.innerText = t.title;
  password.placeholder = t.placeholder;
  loginBtn.innerText = t.login;
  error.innerText = "";
}

function changeLanguage() {
  lang = language.value;
  localStorage.setItem("loginLang", lang);
  localStorage.setItem("language", lang);
  applyLanguage();
}

async function login() {
  const t = texts[lang];
  const pass = password.value;

  error.innerText = "";
  loginBtn.disabled = true;
  loginBtn.innerText = t.logging;

  try {
    const res = await fetch(API + "/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pass })
    });

    const data = await res.json();

    if (!res.ok) {
      error.innerText = t.wrong;
      loginBtn.disabled = false;
      loginBtn.innerText = t.login;
      return;
    }

    localStorage.setItem("adminToken", data.token);
    localStorage.setItem("loginTime", Date.now());
    localStorage.setItem("language", lang);

    window.location.href = "/admin.html";

  } catch (err) {
    error.innerText = t.wrong;
    loginBtn.disabled = false;
    loginBtn.innerText = t.login;
  }
}

function handleEnter(event) {
  if (event.key === "Enter") {
    login();
  }
}

applyLanguage();
</script>

</body>
</html>
